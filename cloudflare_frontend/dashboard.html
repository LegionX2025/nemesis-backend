<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMESIS v33 Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Vis-Network for Graphs -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow: hidden; }
        #graph-container { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 10; }
        
        /* Pulse Animation for Edges (Simulated by vis-network but we can style HTML nodes) */
        @keyframes pulseBorder {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .pulse-node { animation: pulseBorder 2s infinite; }

        .loader-ring {
            display: inline-block; width: 80px; height: 80px;
        }
        .loader-ring:after {
            content: " "; display: block; width: 64px; height: 64px; margin: 8px; border-radius: 50%;
            border: 6px solid #3b82f6; border-color: #3b82f6 transparent #3b82f6 transparent;
            animation: loader-ring 1.2s linear infinite;
        }
        @keyframes loader-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Components
        const NemesisLoader = () => (
            <div className="absolute inset-0 bg-slate-900 bg-opacity-80 z-50 flex flex-col justify-center items-center text-white">
                <div className="loader-ring"></div>
                <h2 className="text-2xl font-bold mt-4 tracking-widest text-blue-400">NEMESIS AI ENGINE</h2>
                <p className="text-sm mt-2 text-slate-300">Reconstructing Multi-Chain Graph Topology...</p>
                <div className="mt-4 text-xs font-mono text-blue-300 w-64">
                    <p>> Normalizing cross-chain signatures...</p>
                    <p>> Fetching heuristics...</p>
                    <p>> Simulating mixer endpoints...</p>
                </div>
            </div>
        );

        const NemesisIDModal = ({ isOpen, onClose, address, profile }) => {
            const chartRef = useRef(null);
            
            useEffect(() => {
                if (isOpen && profile && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['CEX Volume', 'DeFi Volume'],
                            datasets: [{ data: [80, 20], backgroundColor: ['#3b82f6', '#10b981'] }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }
            }, [isOpen, profile]);

            if (!profile) return null;

            return (
                <div className={`fixed inset-y-0 left-0 w-1/3 bg-white shadow-2xl z-40 transform transition-transform duration-300 ease-in-out border-r-4 border-blue-600 flex flex-col ${isOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                    <div className="p-4 bg-slate-900 text-white flex justify-between items-center">
                        <div>
                            <h2 className="text-xl font-bold tracking-widest"><i className="fa-solid fa-id-card mr-2 text-blue-400"></i> NEMESIS ID</h2>
                            <p className="text-xs text-blue-300 break-all">{address}</p>
                        </div>
                        <button onClick={onClose} className="text-slate-400 hover:text-white"><i className="fa-solid fa-times text-2xl"></i></button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-6 bg-slate-50">
                        {/* 1. Wallet Profile */}
                        <div className="bg-white p-4 rounded shadow-sm border border-slate-200 mb-6">
                            <h3 className="text-sm font-bold text-slate-800 mb-3 uppercase border-b pb-2">Wallet Profile</h3>
                            <div className="grid grid-cols-2 gap-2 text-sm">
                                <span className="text-slate-500">Network:</span><span className="font-semibold text-blue-600"><i className="fa-brands fa-ethereum mr-1"></i>{profile.network}</span>
                                <span className="text-slate-500">Balance:</span><span className="font-bold">{profile.balance}</span>
                                <span className="text-slate-500">Total Sent:</span><span className="font-semibold text-red-600">{profile.total_sent}</span>
                                <span className="text-slate-500">Total Received:</span><span className="font-semibold text-green-600">{profile.total_received}</span>
                                <span className="text-slate-500">First Activity:</span><span className="text-xs">{profile.first_activity}</span>
                            </div>
                        </div>

                        {/* Transaction History & CEX Landed */}
                        <div className="bg-white p-4 rounded shadow-sm border border-slate-200 mb-6">
                            <h3 className="text-sm font-bold text-slate-800 mb-3 uppercase border-b pb-2">Transaction History / CEX Landings</h3>
                            <ul className="text-sm text-slate-600 space-y-2">
                                {profile.cex_interactions.map((c, i) => (
                                    <li key={i} className="flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-100">
                                        <span className="font-bold text-slate-800">{c.exchange}</span>
                                        <span className="text-green-600 font-bold">{c.amount}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {/* 6. Intelligence Signals (Moved below Tx History per request) */}
                        <div className="bg-blue-50 p-4 rounded shadow-sm border border-blue-200 mb-6">
                            <h3 className="text-sm font-bold text-blue-900 mb-3 uppercase border-b border-blue-200 pb-2"><i className="fa-solid fa-satellite-dish mr-2"></i> Intelligence Signals</h3>
                            <ul className="text-sm text-blue-800 space-y-2">
                                {profile.osint.map((o, i) => (
                                    <li key={i}><strong>{o.source}:</strong> {o.info}</li>
                                ))}
                            </ul>
                        </div>

                        {/* Analytics Charts */}
                        <div className="bg-white p-4 rounded shadow-sm border border-slate-200 mb-6 h-64">
                            <h3 className="text-sm font-bold text-slate-800 mb-3 uppercase border-b pb-2">Volume Analytics</h3>
                            <div className="h-40"><canvas ref={chartRef}></canvas></div>
                        </div>
                        
                        {/* Smart Contract & Multi-Chain placeholders */}
                        <div className="bg-slate-800 text-white p-4 rounded shadow-sm mb-6 cursor-pointer hover:bg-slate-700 transition">
                            <h3 className="text-sm font-bold uppercase"><i className="fa-solid fa-code mr-2"></i> View Smart Contract Code</h3>
                        </div>
                    </div>
                </div>
            );
        };

        const TopBar = ({ onSearch, isAutonomous, setAutonomous }) => {
            const [input, setInput] = useState("0x3b5D17e2236f4D773DA87EE10B71D80C5e5b5772");
            const [amount, setAmount] = useState(1999500);

            const handleSubmit = (e) => {
                e.preventDefault();
                onSearch(input, amount);
            };

            return (
                <div className="absolute top-0 left-0 w-full z-30 p-4 pointer-events-none">
                    <form onSubmit={handleSubmit} className="pointer-events-auto bg-white p-3 rounded-lg shadow-lg flex items-center space-x-4 max-w-4xl mx-auto border border-slate-200">
                        <img src="/static/logo_nemesis.jpeg" alt="LGN" className="h-10 w-10 object-contain rounded" onError={(e) => e.target.style.display='none'} />
                        <div className="flex-1">
                            <input 
                                type="text" 
                                value={input} 
                                onChange={(e) => setInput(e.target.value)}
                                className="w-full bg-slate-100 text-slate-800 px-4 py-2 rounded border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                                placeholder="Enter Wallet Address (0x...)" 
                            />
                        </div>
                        <div className="w-32">
                            <input 
                                type="number" 
                                value={amount} 
                                onChange={(e) => setAmount(Number(e.target.value))}
                                className="w-full bg-slate-100 text-slate-800 px-4 py-2 rounded border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                                placeholder="Loss $" 
                            />
                        </div>
                        <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-bold transition flex items-center">
                            <i className="fa-solid fa-search mr-2"></i> Trace
                        </button>
                        <button type="button" onClick={() => setAutonomous(!isAutonomous)} className={`px-6 py-2 rounded font-bold transition flex items-center border-2 ${isAutonomous ? 'bg-red-600 text-white border-red-600 shadow-red-500/50 shadow-lg' : 'bg-transparent text-slate-500 border-slate-300 hover:border-slate-400'}`}>
                            <i className="fa-solid fa-robot mr-2"></i> Autonomous
                        </button>
                    </form>
                </div>
            );
        };

        const GraphFilters = () => (
            <div className="absolute top-24 right-4 w-64 bg-white p-4 rounded-lg shadow-xl z-30 border border-slate-200 text-sm pointer-events-auto max-h-[80vh] overflow-y-auto">
                <h3 className="font-bold text-slate-800 border-b pb-2 mb-3"><i className="fa-solid fa-filter text-blue-500 mr-2"></i> Graph Filters</h3>
                
                <div className="mb-4">
                    <h4 className="font-semibold text-slate-600 mb-2">Visibility</h4>
                    <label className="flex items-center space-x-2 mb-1"><input type="checkbox" defaultChecked className="form-checkbox text-blue-600" /> <span>CEX / VASP</span></label>
                    <label className="flex items-center space-x-2 mb-1"><input type="checkbox" defaultChecked className="form-checkbox text-blue-600" /> <span>Bridge</span></label>
                    <label className="flex items-center space-x-2 mb-1"><input type="checkbox" defaultChecked className="form-checkbox text-blue-600" /> <span>Mixer</span></label>
                    <label className="flex items-center space-x-2 mb-1"><input type="checkbox" defaultChecked className="form-checkbox text-blue-600" /> <span>Private Wallet</span></label>
                </div>

                <div className="mb-4">
                    <h4 className="font-semibold text-slate-600 mb-2">Edge Types</h4>
                    <label className="flex items-center space-x-2 mb-1"><input type="checkbox" defaultChecked className="form-checkbox" /> <span>Native Transfer</span></label>
                    <label className="flex items-center space-x-2 mb-1"><input type="checkbox" defaultChecked className="form-checkbox" /> <span>Tokens (ERC20)</span></label>
                </div>

                <div className="mb-4">
                    <h4 className="font-semibold text-slate-600 mb-2">Amount Filter (USD)</h4>
                    <input type="range" min="0" max="1000000" className="w-full" />
                </div>
            </div>
        );

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [graphData, setGraphData] = useState(null);
            const [network, setNetwork] = useState(null); // vis-network instance
            const [isAutonomous, setAutonomous] = useState(false);
            
            // Modal State
            const [modalOpen, setModalOpen] = useState(false);
            const [activeNodeId, setActiveNodeId] = useState(null);
            const [activeProfile, setActiveProfile] = useState(null);
            
            // Alert State
            const [alertModal, setAlertModal] = useState({ open: false, title: "", message: "", data: null });
            
            const graphContainerRef = useRef(null);

            const handleSearch = async (address, amount) => {
                setLoading(true);
                try {
                    const res = await fetch('http://localhost:8000/api/trace', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ address, target_amount: amount, autonomous_mode: isAutonomous })
                    });
                    const data = await res.json();
                    
                    if (data.status === 'success') {
                        const styledNodes = data.graph.nodes.map(n => ({
                            ...n,
                            font: { size: 14, color: '#0f172a', face: 'Inter', multi: true, bold: 'true' },
                            borderWidth: 4,
                            color: {
                                border: n.group === 'victim' ? '#d97706' : n.group === 'cex' ? '#10b981' : n.group === 'mixer' ? '#f59e0b' : '#3b82f6',
                                background: '#ffffff',
                                highlight: { border: '#1e3a8a', background: '#f8fafc' }
                            },
                            size: 40,
                            shadow: true
                        }));

                        const styledEdges = data.graph.edges.map(e => ({
                            ...e,
                            font: { size: 12, align: 'top', color: '#475569', background: '#f1f5f9', strokeWidth: 0 },
                            width: 2,
                            smooth: { type: 'cubicBezier', forceDirection: 'horizontal', roundness: 0.4 }
                        }));

                        setGraphData({ nodes: styledNodes, edges: styledEdges });

                        if (isAutonomous) {
                            const cexNodes = styledNodes.filter(n => n.group === 'cex');
                            setAlertModal({
                                open: true,
                                title: "AUTONOMOUS TRACE COMPLETE",
                                message: `Successfully traced flows to terminal endpoints. Found ${cexNodes.length} Custodial/CEX endpoints.`,
                                data: cexNodes
                            });
                        }
                    }
                } catch (e) {
                    alert('Error tracing address: ' + e);
                }
                setLoading(false);
            };

            // Initialize Graph when data changes
            useEffect(() => {
                if (graphData && graphContainerRef.current) {
                    const data = {
                        nodes: new vis.DataSet(graphData.nodes),
                        edges: new vis.DataSet(graphData.edges)
                    };
                    const options = {
                        physics: { enabled: false }, // Use fixed layout or hierarchical
                        layout: {
                            hierarchical: {
                                direction: 'LR', // Left to Right
                                levelSeparation: 350,
                                nodeSpacing: 150
                            }
                        },
                        interaction: { hover: true, tooltipDelay: 200 },
                        edges: {
                            arrows: { to: { enabled: true, scaleFactor: 1, type: 'arrow' } },
                            color: { inherit: false },
                            selectionWidth: 3
                        }
                    };

                    const nw = new vis.Network(graphContainerRef.current, data, options);
                    
                    // Handle Node Click
                    nw.on("click", async function (params) {
                        if (params.nodes.length > 0) {
                            const nodeId = params.nodes[0];
                            setActiveNodeId(nodeId);
                            setModalOpen(true);
                            
                            // Fetch NEMESIS ID Profile
                            try {
                                const pres = await fetch(`http://localhost:8000/api/nemesis_id/${nodeId}`);
                                const pdata = await pres.json();
                                setActiveProfile(pdata);
                                
                                // Alert logic for CEX
                                if (pdata.cex_interactions && pdata.cex_interactions.length > 0) {
                                    setAlertModal({
                                        open: true,
                                        title: "CEX LANDING DETECTED",
                                        message: `Funds have landed in verified Custodial/Exchange wallets for ${nodeId}. Subpoena recommended.`,
                                        data: pdata.cex_interactions
                                    });
                                }
                            } catch (e) {
                                console.error(e);
                            }
                        }
                    });

                    setNetwork(nw);
                }
            }, [graphData]);

            return (
                <div className="relative w-full h-screen bg-slate-50">
                    <TopBar onSearch={handleSearch} isAutonomous={isAutonomous} setAutonomous={setAutonomous} />
                    
                    {loading && <NemesisLoader />}
                    
                    {/* The Graph Canvas */}
                    <div id="graph-container" ref={graphContainerRef} className="cursor-grab"></div>
                    
                    {graphData && <GraphFilters />}

                    <NemesisIDModal 
                        isOpen={modalOpen} 
                        onClose={() => setModalOpen(false)} 
                        address={activeNodeId} 
                        profile={activeProfile} 
                    />

                    {/* Alert Modal */}
                    {alertModal.open && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-50">
                            <div className="bg-white rounded-lg shadow-2xl p-6 w-1/3 border-t-4 border-red-600">
                                <h2 className="text-xl font-bold text-red-600 mb-2"><i className="fa-solid fa-triangle-exclamation mr-2"></i>{alertModal.title}</h2>
                                <p className="text-sm text-slate-600 mb-4">{alertModal.message}</p>
                                
                                <div className="bg-slate-50 p-3 rounded border border-slate-200 max-h-48 overflow-y-auto text-sm">
                                    {Array.isArray(alertModal.data) && alertModal.data.map((item, idx) => (
                                        <div key={idx} className="mb-2 pb-2 border-b border-slate-200 last:border-0 last:pb-0 last:mb-0">
                                            <strong>{item.exchange || item.label || item.id}</strong>: {item.amount || (item.value ? `$${item.value}` : 'Endpoint')}
                                        </div>
                                    ))}
                                </div>
                                
                                <button onClick={() => setAlertModal({ open: false })} className="mt-4 w-full bg-slate-800 text-white font-bold py-2 rounded hover:bg-slate-700">Acknowledge</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
