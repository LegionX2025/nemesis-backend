<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMESIS Ω - Autonomous Intelligence OS</title>
    <!-- Light Theme Styling -->
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: 80px 1fr;
            grid-gap: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        header {
            grid-column: 1 / -1;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            background-color: #dcfce7;
            color: #166534;
        }

        .panel {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            padding: 20px;
            overflow-y: auto;
        }

        .panel h2 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 0;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Swarm Grid */
        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .agent-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fbfbfc;
        }

        .agent-card .agent-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .agent-card .agent-status {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
            background: #f1f5f9;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .agent-card.active .agent-status {
            background: var(--accent-blue);
            color: white;
        }

        .agent-card.healing .agent-status {
            background: var(--accent-red);
            color: white;
        }

        /* Logs Console */
        .logs-container {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            background: #1e293b; /* Keep logs dark for contrast */
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-entry {
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .log-timestamp { color: #94a3b8; margin-right: 8px; }
        .log-level { font-weight: bold; margin-right: 8px; }
        .log-level.system { color: #38bdf8; }
        .log-level.critical { color: #f87171; }
        .log-level.healing { color: #fbbf24; }
        .log-level.intelligence { color: #a78bfa; }

        /* Graph Container */
        #graph-container {
            width: 100%;
            height: calc(100% - 350px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fafafa;
        }
    </style>
    <!-- SocketIO & Vis.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.js"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>

    <header>
        <h1>NEMESIS Ω <span style="color: var(--text-secondary); font-weight: 400; font-size: 1rem;">| Autonomous Intelligence Operating System</span></h1>
        <div id="connection-status" class="status-badge" style="background: #fee2e2; color: #991b1b;">Engine Disconnected</div>
    </header>

    <div class="panel" style="grid-column: 1;">
        <h2>Global System State</h2>
        <div style="font-size: 2.5rem; font-weight: 800; color: var(--accent-blue); margin-bottom: 24px;" id="fsm-state">
            BOOT
        </div>

        <h2>Autonomous Swarm</h2>
        <div class="agent-list" id="swarm-list">
            <!-- Populated via JS -->
        </div>
    </div>

    <div class="panel" style="grid-column: 2;">
        <h2>Graph Intelligence</h2>
        <div id="graph-container"></div>

        <h2>Execution Logs</h2>
        <div class="logs-container" id="logs">
            <div class="log-entry">Awaiting telemetry...</div>
        </div>
    </div>

    <script>
        const socket = io("http://localhost:8888");

        // Elements
        const elConnection = document.getElementById("connection-status");
        const elFsmState = document.getElementById("fsm-state");
        const elSwarmList = document.getElementById("swarm-list");
        const elLogs = document.getElementById("logs");

        // Graph initialization
        const nodes = new vis.DataSet([
            { id: 1, label: 'NEMESIS CORE', color: '#3b82f6', shape: 'hexagon' }
        ]);
        const edges = new vis.DataSet([]);
        const container = document.getElementById('graph-container');
        const data = { nodes: nodes, edges: edges };
        const options = {
            nodes: { font: { color: '#1e293b' }, borderWidth: 2, shadow: true },
            edges: { color: '#94a3b8', smooth: true }
        };
        const network = new vis.Network(container, data, options);

        socket.on('connect', () => {
            elConnection.innerText = "Engine Connected";
            elConnection.style.background = "#dcfce7";
            elConnection.style.color = "#166534";
        });

        socket.on('disconnect', () => {
            elConnection.innerText = "Engine Disconnected";
            elConnection.style.background = "#fee2e2";
            elConnection.style.color = "#991b1b";
        });

        socket.on('omega_telemetry', (payload) => {
            elFsmState.innerText = payload.state;
            
            // Render Swarm
            elSwarmList.innerHTML = '';
            for (const [agent, status] of Object.entries(payload.agents)) {
                let cardClass = 'agent-card';
                if (status !== 'Idle' && status !== 'Standby') cardClass += ' active';
                if (payload.state === 'SELF_HEAL') cardClass = 'agent-card healing';

                elSwarmList.innerHTML += `
                    <div class="${cardClass}">
                        <span class="agent-name">${agent.replace('_', ' ')}</span>
                        <span class="agent-status">${status}</span>
                    </div>
                `;
            }

            // Simulate Graph Node populating based on FSM State
            if(payload.state === 'DISCOVER' && !nodes.get(2)) {
                nodes.add({ id: 2, label: 'Target Resolved', color: '#10b981' });
                edges.add({ from: 1, to: 2 });
            }
            if(payload.state === 'ANALYZE' && !nodes.get(3)) {
                nodes.add({ id: 3, label: 'Cluster Mapping', color: '#f59e0b' });
                edges.add({ from: 2, to: 3 });
            }
        });

        socket.on('omega_log', (payload) => {
            const levelClass = payload.level.toLowerCase();
            const logHTML = `
                <div class="log-entry">
                    <span class="log-timestamp">[${payload.timestamp}]</span>
                    <span class="log-level ${levelClass}">[${payload.level}]</span>
                    <span>${payload.message}</span>
                </div>
            `;
            elLogs.insertAdjacentHTML('beforeend', logHTML);
            elLogs.scrollTop = elLogs.scrollHeight;
        });

    </script>
</body>
</html>
