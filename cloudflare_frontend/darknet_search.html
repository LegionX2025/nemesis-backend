<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lionsgate NEMESIS | Darknet Intelligence Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        .neon-border {
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2), inset 0 0 10px rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.4);
        }
        .search-input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-5xl space-y-8">
        <div class="text-center">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 tracking-tight">NEMESIS DARKNET INDEX</h1>
            <p class="mt-3 text-lg text-gray-400">Query the autonomous deep-web intelligence database.</p>
        </div>

        <div class="glass-panel p-6 shadow-2xl">
            <div class="flex gap-4">
                <input type="text" id="searchInput" placeholder="Enter keyword, wallet address, or onion URL..." class="flex-1 bg-black/50 border border-gray-700 text-white rounded-lg px-4 py-3 search-input transition-all duration-300">
                <button onclick="performSearch()" class="px-8 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-semibold transition-colors duration-200 neon-border">SEARCH</button>
            </div>
            
            <div id="loading" class="hidden mt-6 text-center text-purple-400">
                <svg class="animate-spin h-8 w-8 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="mt-2 text-sm">Querying Darknet Database...</p>
            </div>
        </div>

        <div id="resultsContainer" class="space-y-6 hidden">
            <!-- Results will be injected here -->
        </div>
    </div>

    <script>
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const loading = document.getElementById('loading');
            const resultsContainer = document.getElementById('resultsContainer');
            
            loading.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            resultsContainer.innerHTML = '';

            try {
                // Ensure this URL points to the backend /api/darknet/search endpoint
                // Assuming it's running on the same host or has CORS enabled
                const response = await fetch('https://nemesis-api.legionxgaming2021.workers.dev/api/darknet/search?q=' + encodeURIComponent(query));
                const data = await response.json();

                if (data.error || data.status === 'error') {
                    resultsContainer.innerHTML = `<div class="glass-panel p-6 text-red-400">Error: ${data.message || data.error}</div>`;
                } else if (data.results && data.results.length > 0) {
                    let html = `<h2 class="text-xl font-semibold text-gray-300 mb-4">Found ${data.results.length} Intel Records</h2>`;
                    
                    data.results.forEach((doc, index) => {
                        const web = doc.web_info || {};
                        const title = web.title || 'Untitled Onion Site';
                        const url = web.url || 'Unknown URL';
                        const content = web.content || '';
                        const shortContent = content.substring(0, 300) + (content.length > 300 ? '...' : '');
                        
                        // Sanitize content for HTML rendering
                        const sanitizeHtml = (str) => {
                            const temp = document.createElement('div');
                            temp.textContent = str;
                            return temp.innerHTML;
                        };
                        const fullContentHtml = sanitizeHtml(content).replace(/\n/g, '<br>');
                        
                        let entitiesHtml = '';
                        let fullEntitiesHtml = '';
                        if (doc.uie_entities && doc.uie_entities.length > 0) {
                            const uniqueEntities = [...new Set(doc.uie_entities.map(e => e.value))].slice(0, 5);
                            entitiesHtml = `<div class="mt-3 flex flex-wrap gap-2">
                                ${uniqueEntities.map(e => `<span class="px-2 py-1 bg-[#00ff88]/10 text-[#00ff88] border border-[#00ff88]/30 rounded text-[10px] uppercase font-bold tracking-wider">${sanitizeHtml(e)}</span>`).join('')}
                            </div>`;
                            
                            const allEntitiesHtml = doc.uie_entities.map(e => `
                                <div class="flex justify-between items-center bg-black/60 border border-[#00b8ff]/20 p-3 rounded text-xs hover:border-[#00b8ff]/50 transition-colors">
                                    <span class="text-gray-400 font-bold uppercase tracking-widest text-[10px]">${sanitizeHtml(e.label || 'ENTITY')}</span>
                                    <span class="text-[#00b8ff] font-mono">${sanitizeHtml(e.value)}</span>
                                </div>
                            `).join('');
                            fullEntitiesHtml = `<div class="mt-6"><h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3 border-b border-gray-800 pb-2 flex items-center gap-2"><svg class="w-3 h-3 text-[#00b8ff]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg> Extracted Entities</h4><div class="grid grid-cols-1 md:grid-cols-2 gap-3">${allEntitiesHtml}</div></div>`;
                        }
                        
                        let keywordsHtml = '';
                        if (doc.keywords_detected && doc.keywords_detected.length > 0) {
                             keywordsHtml = `<div class="mt-6"><h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3 border-b border-gray-800 pb-2 flex items-center gap-2"><svg class="w-3 h-3 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path></svg> Target Keywords</h4>
                             <div class="flex flex-wrap gap-2">
                                ${doc.keywords_detected.map(k => `<span class="px-2 py-1 bg-purple-900/40 text-purple-300 border border-purple-800 rounded text-xs font-mono shadow-[0_0_10px_rgba(168,85,247,0.1)]">${sanitizeHtml(k)}</span>`).join('')}
                             </div></div>`;
                        }

                        html += `
                        <div class="glass-panel transition-all duration-300 hover:border-purple-500/50 mb-6 overflow-hidden border border-gray-800 shadow-xl group">
                            <!-- Collapsed View / Header -->
                            <div class="p-6 cursor-pointer flex flex-col hover:bg-white/5 transition-colors relative" onclick="toggleExpand('result-${index}')">
                                <div class="absolute right-6 top-6 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <span class="text-[10px] font-bold text-purple-400 uppercase tracking-widest border border-purple-500/50 rounded px-2 py-1 flex items-center gap-1 bg-purple-500/10">
                                        Click to Expand <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </span>
                                </div>
                                
                                <div class="flex justify-between items-start mb-3 pr-32">
                                    <h3 class="text-xl font-black text-white truncate">${sanitizeHtml(title)}</h3>
                                </div>
                                <div class="text-sm text-purple-400 mb-4 block truncate font-mono flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                    ${sanitizeHtml(url)}
                                </div>
                                <div class="flex justify-between items-end">
                                    <div class="flex-1">
                                        <p id="short-content-${index}" class="text-gray-400 text-sm leading-relaxed border-l-2 border-purple-500/30 pl-3 italic">${sanitizeHtml(shortContent)}</p>
                                        <div id="short-entities-${index}">
                                            ${entitiesHtml}
                                        </div>
                                    </div>
                                    <span class="text-[10px] font-mono text-gray-500 whitespace-nowrap bg-black/80 px-3 py-1.5 rounded border border-gray-800 ml-4">${sanitizeHtml(doc.crawled_at) || 'Recent'}</span>
                                </div>
                            </div>
                            
                            <!-- Expanded View -->
                            <div id="result-${index}" class="hidden border-t border-gray-800 bg-[rgba(10,10,12,0.9)] p-6">
                                <h4 class="text-[10px] font-bold text-[#00ff88] uppercase tracking-widest mb-3 border-b border-[#00ff88]/20 pb-2 flex items-center gap-2">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> Raw Intercepted Content
                                </h4>
                                <div class="text-gray-300 text-sm leading-relaxed whitespace-pre-wrap font-mono bg-black/80 p-5 rounded border border-gray-800 max-h-96 overflow-y-auto mb-6 shadow-inner">
${fullContentHtml}
                                </div>
                                
                                ${fullEntitiesHtml}
                                ${keywordsHtml}
                                
                                <div class="mt-8 flex justify-between items-center border-t border-gray-800 pt-5">
                                    <span class="text-[10px] font-mono text-gray-600 uppercase tracking-widest">Database ID: ${sanitizeHtml(doc['hash-ID'] || 'UNKNOWN')}</span>
                                    <a href="${sanitizeHtml(url)}" target="_blank" class="px-6 py-2.5 bg-purple-600/20 text-purple-400 hover:bg-purple-600 hover:text-white hover:shadow-[0_0_15px_rgba(168,85,247,0.5)] border border-purple-500/50 rounded text-xs font-bold uppercase tracking-widest transition-all flex items-center gap-2">
                                        Access Live Node <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                        `;
                    });
                    resultsContainer.innerHTML = html;
                } else {
                    resultsContainer.innerHTML = `<div class="glass-panel p-6 text-gray-400 text-center">No intel records found matching your query.</div>`;
                }
            } catch (err) {
                resultsContainer.innerHTML = `<div class="glass-panel p-6 text-red-400">Network Error: Could not connect to Darknet index.</div>`;
            }

            loading.classList.add('hidden');
            resultsContainer.classList.remove('hidden');
        }

        // Enter key support
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });

        // Expand/Collapse logic
        function toggleExpand(id) {
            const el = document.getElementById(id);
            const index = id.split('-')[1];
            const shortContent = document.getElementById('short-content-' + index);
            const shortEntities = document.getElementById('short-entities-' + index);
            
            if (el.classList.contains('hidden')) {
                // Expand
                el.classList.remove('hidden');
                shortContent.classList.add('hidden');
                if (shortEntities) shortEntities.classList.add('hidden');
            } else {
                // Collapse
                el.classList.add('hidden');
                shortContent.classList.remove('hidden');
                if (shortEntities) shortEntities.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
