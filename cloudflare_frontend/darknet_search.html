<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23050b14'/%3E%3Cpath d='M30,20 L30,80 L70,80 L70,20 Z' fill='none' stroke='%2300ffcc' stroke-width='5'/%3E%3Cpath d='M30,20 L70,80' stroke='%2300ffcc' stroke-width='5'/%3E%3C/svg%3E">
    <title>NEMESIS Phase 2: Darknet Forensics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body class="min-h-screen bg-slate-50 dark:bg-[#050505] text-slate-900 dark:text-gray-200 transition-colors duration-300">
    <!-- Navbar injected here by menu.js -->
    <div id="navbar-container"></div>
    
    <div class="w-full max-w-5xl mx-auto space-y-8 mt-24 px-4 sm:px-6 lg:px-8">
        <div class="text-center">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-600 tracking-tight">NEMESIS DARKNET INDEX</h1>
            <p class="mt-3 text-lg text-slate-500 dark:text-gray-400">Query the autonomous deep-web intelligence database.</p>
        </div>

        <div class="bg-white dark:bg-[#0f0f0f]/70 dark:backdrop-blur-md p-6 rounded-xl border border-slate-200 dark:border-white/5 shadow-lg">
            <div class="flex gap-4">
                <input type="text" id="searchInput" placeholder="Enter keyword, wallet address, or onion URL..." class="flex-1 bg-slate-100 dark:bg-black/50 border border-slate-300 dark:border-gray-700 text-slate-900 dark:text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all duration-300">
                <button onclick="performSearch()" class="px-8 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-semibold transition-colors duration-200 shadow-md hover:shadow-purple-500/30">SEARCH</button>
            </div>
            
            <div id="loading" class="hidden mt-6 text-center text-purple-600 dark:text-purple-400">
                <svg class="animate-spin h-8 w-8 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="mt-2 text-sm font-medium">Querying Intelligence Databases...</p>
            </div>
        </div>

        <div id="resultsContainer" class="space-y-6 hidden pb-12">
            <!-- Results will be injected here -->
        </div>
    </div>

    <script src="menu.js"></script>
    <script>
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const loading = document.getElementById('loading');
            const resultsContainer = document.getElementById('resultsContainer');
            
            loading.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            resultsContainer.innerHTML = '';

            try {
                const response = await fetch('https://nemesis-backend-rwp4.onrender.com/api/darknet/search?q=' + encodeURIComponent(query));
                const data = await response.json();

                if (data.error || data.status === 'error') {
                    resultsContainer.innerHTML = `<div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-900/50 p-6 rounded-xl text-red-600 dark:text-red-400">Error: ${data.message || data.error}</div>`;
                } else if (data.results && data.results.length > 0) {
                    let html = `<h2 class="text-xl font-semibold text-slate-800 dark:text-gray-300 mb-4">Found ${data.results.length} Intel Records</h2>`;
                    
                    data.results.forEach(doc => {
                        if (doc.collection === 'entity') {
                            html += `
                            <div class="bg-white dark:bg-[#0f0f0f]/70 p-6 rounded-xl border-l-4 border-l-blue-500 border border-slate-200 dark:border-white/5 shadow-sm transition-all duration-300 hover:border-blue-400 hover:shadow-md">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="text-lg font-bold text-blue-600 dark:text-blue-400 truncate pr-4">[ENTITY] ${doc.name}</h3>
                                </div>
                                <p class="text-slate-600 dark:text-gray-300 text-sm mb-3">${doc.description || 'No description provided.'}</p>
                                <pre class="text-xs text-slate-500 dark:text-gray-400 overflow-x-auto p-3 bg-slate-50 dark:bg-black/40 rounded-lg font-mono border border-slate-100 dark:border-white/5">${JSON.stringify(doc.data, null, 2)}</pre>
                            </div>
                            `;
                        } else if (doc.collection === 'vasp') {
                            html += `
                            <div class="bg-white dark:bg-[#0f0f0f]/70 p-6 rounded-xl border-l-4 border-l-emerald-500 border border-slate-200 dark:border-white/5 shadow-sm transition-all duration-300 hover:border-emerald-400 hover:shadow-md">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="text-lg font-bold text-emerald-600 dark:text-emerald-400 truncate pr-4">[VASP] ${doc.name}</h3>
                                    <span class="text-xs font-semibold px-2.5 py-1 bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 rounded-md">${doc.country || 'Unknown'}</span>
                                </div>
                                <a href="https://${doc.domain}" target="_blank" class="text-sm text-emerald-500 hover:text-emerald-600 dark:text-emerald-400 dark:hover:text-emerald-300 mb-3 block truncate font-mono">${doc.domain}</a>
                                <pre class="text-xs text-slate-500 dark:text-gray-400 overflow-x-auto p-3 bg-slate-50 dark:bg-black/40 rounded-lg font-mono border border-slate-100 dark:border-white/5">${JSON.stringify(doc.data, null, 2)}</pre>
                            </div>
                            `;
                        } else {
                            // Default darknet rendering
                            const web = doc.web_info || {};
                            const title = web.title || 'Untitled Onion Site';
                            const url = web.url || 'Unknown URL';
                            const content = (web.content || '').substring(0, 300) + '...';
                            
                            let entitiesHtml = '';
                            if (doc.uie_entities && doc.uie_entities.length > 0) {
                                const uniqueEntities = [...new Set(doc.uie_entities.map(e => e.value))].slice(0, 5);
                                entitiesHtml = `<div class="mt-4 flex flex-wrap gap-2">
                                    ${uniqueEntities.map(e => `<span class="px-2.5 py-1 bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-300 border border-rose-200 dark:border-rose-800/50 rounded-md text-xs font-mono font-medium">${e}</span>`).join('')}
                                </div>`;
                            }

                            html += `
                            <div class="bg-white dark:bg-[#0f0f0f]/70 p-6 rounded-xl border border-slate-200 dark:border-white/5 shadow-sm transition-all duration-300 hover:border-purple-500/50 hover:shadow-md">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="text-lg font-bold text-slate-900 dark:text-white truncate pr-4">${title}</h3>
                                    <span class="text-xs font-medium text-slate-500 dark:text-gray-500 whitespace-nowrap">${doc.crawled_at || 'Recent'}</span>
                                </div>
                                <a href="${url}" target="_blank" class="text-sm text-purple-600 hover:text-purple-700 dark:text-purple-400 dark:hover:text-purple-300 mb-3 block truncate font-mono">${url}</a>
                                <p class="text-slate-600 dark:text-gray-400 text-sm leading-relaxed">${content}</p>
                                ${entitiesHtml}
                            </div>
                            `;
                        }
                    });
                    resultsContainer.innerHTML = html;
                } else {
                    resultsContainer.innerHTML = `<div class="bg-white dark:bg-[#0f0f0f]/70 border border-slate-200 dark:border-white/5 p-8 rounded-xl text-slate-500 dark:text-gray-400 text-center shadow-sm">No intel records found matching your query.</div>`;
                }
            } catch (err) {
                resultsContainer.innerHTML = `<div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-900/50 p-6 rounded-xl text-red-600 dark:text-red-400">Network Error: Could not connect to Darknet index.</div>`;
            }

            loading.classList.add('hidden');
            resultsContainer.classList.remove('hidden');
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
