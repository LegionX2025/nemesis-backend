<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lionsgate NEMESIS | Live Darknet Graph</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; padding: 0; }
        #network {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .overlay {
            position: absolute;
            z-index: 10;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
        }
        .top-left { top: 20px; left: 20px; }
        .bottom-right { bottom: 20px; right: 20px; width: 400px; max-height: 300px; overflow-y: auto; }
        .neon-text {
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            background-image: linear-gradient(to right, #a855f7, #ec4899);
        }
        
        /* Custom scrollbar for logs */
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        .log-container::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.5); border-radius: 3px; }
    </style>
</head>
<body>

    <div id="network"></div>

    <div class="overlay top-left flex flex-col gap-2">
        <h1 class="text-2xl font-extrabold neon-text tracking-tight flex items-center gap-2">
            <i class="fa-solid fa-chart-network text-purple-500"></i> NEMESIS LIVE DARKNET
        </h1>
        <div class="text-xs text-gray-400 font-mono flex items-center gap-2">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
            </span>
            Live Intelligence Stream Connected
        </div>
        <div class="mt-4 text-sm space-y-1">
            <div class="flex justify-between w-48"><span class="text-gray-500">Nodes Discovered:</span> <span id="nodeCount" class="font-mono text-purple-400 font-bold">0</span></div>
            <div class="flex justify-between w-48"><span class="text-gray-500">Relationships:</span> <span id="edgeCount" class="font-mono text-pink-400 font-bold">0</span></div>
        </div>
    </div>

    <div class="overlay bottom-right flex flex-col gap-2">
        <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest border-b border-gray-700 pb-2 mb-2">Live Crawler Logs</h3>
        <div id="logContainer" class="log-container flex-1 overflow-y-auto space-y-1 text-xs font-mono">
            <!-- Logs appear here -->
        </div>
    </div>

    <script>
        // Vis.js Network Setup
        const nodes = new vis.DataSet([]);
        const edges = new vis.DataSet([]);
        const container = document.getElementById('network');
        
        const data = { nodes: nodes, edges: edges };
        const options = {
            nodes: {
                shape: 'dot',
                size: 16,
                font: { size: 12, color: '#e5e7eb', face: 'monospace' },
                borderWidth: 2,
                shadow: { enabled: true, color: 'rgba(168, 85, 247, 0.4)', size: 10 }
            },
            edges: {
                width: 1,
                color: { inherit: 'from', opacity: 0.6 },
                smooth: { type: 'continuous' }
            },
            physics: {
                forceAtlas2Based: { gravitationalConstant: -50, centralGravity: 0.01, springLength: 100, springConstant: 0.08 },
                maxVelocity: 50,
                solver: 'forceAtlas2Based',
                timestep: 0.35,
                stabilization: { iterations: 150 }
            }
        };
        const network = new vis.Network(container, data, options);

        // Stats UI
        const nodeCountEl = document.getElementById('nodeCount');
        const edgeCountEl = document.getElementById('edgeCount');
        const logContainer = document.getElementById('logContainer');

        function addLog(ts, msg, style) {
            const el = document.createElement('div');
            let colorClass = 'text-gray-400';
            if (style === 'red') colorClass = 'text-red-400';
            else if (style === 'green') colorClass = 'text-green-400';
            else if (style === 'bold magenta') colorClass = 'text-fuchsia-400 font-bold';
            else if (style === 'bold yellow') colorClass = 'text-yellow-400 font-bold';
            else if (style === 'cyan') colorClass = 'text-cyan-400';
            
            el.innerHTML = `<span class="text-gray-600">[${ts}]</span> <span class="${colorClass}">${msg}</span>`;
            logContainer.appendChild(el);
            if (logContainer.childElementCount > 100) {
                logContainer.removeChild(logContainer.firstChild);
            }
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function getColorForType(type) {
            const typeMap = {
                'onion': '#a855f7',
                'crypto_address': '#10b981',
                'btc': '#f59e0b',
                'eth': '#3b82f6',
                'xmr': '#f97316',
                'telegram': '#06b6d4',
                'email': '#ef4444'
            };
            for (const key in typeMap) {
                if (type && type.toLowerCase().includes(key)) return typeMap[key];
            }
            return '#6366f1';
        }

        function getIconForType(type) {
            // Can use fontAwesome unicode for labels if desired, or just shapes. Using colors for now.
            return 'dot';
        }

        // Connect to WebSocket
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        // Connect to the Render backend WebSocket
        const wsUrl = 'wss://nemesis-backend-rwp4.onrender.com/ws/darknet/stream';
        
        let ws;
        function connect() {
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                addLog(new Date().toLocaleTimeString(), "Connected to Live Omni-Chain Intelligence Stream.", "green");
            };
            ws.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    
                    if (payload.event === 'log' && payload.data) {
                        addLog(payload.data.ts, payload.data.message, payload.data.style);
                    } 
                    else if (payload.event === 'graph' && payload.data) {
                        const graphData = payload.data;
                        if (graphData.nodes) {
                            graphData.nodes.forEach(n => {
                                if (!nodes.get(n.id)) {
                                    nodes.add({
                                        id: n.id,
                                        label: n.label,
                                        title: n.title || n.label,
                                        color: { background: getColorForType(n.group), border: '#fff' }
                                    });
                                }
                            });
                        }
                        if (graphData.edges) {
                            graphData.edges.forEach(e => {
                                const edgeId = e.source + '-' + e.target;
                                if (!edges.get(edgeId)) {
                                    edges.add({
                                        id: edgeId,
                                        from: e.source,
                                        to: e.target,
                                        title: e.label || ''
                                    });
                                }
                            });
                        }
                        nodeCountEl.innerText = nodes.length;
                        edgeCountEl.innerText = edges.length;
                    }
                    else if (payload.event === 'entity' && payload.data) {
                        addLog(payload.data.ts, `Identified [${payload.data.type}] -> ${payload.data.val}`, "cyan");
                    }
                } catch (e) {
                    console.error("Error parsing WS message", e);
                }
            };
            ws.onclose = () => {
                addLog(new Date().toLocaleTimeString(), "Connection lost. Reconnecting...", "red");
                setTimeout(connect, 3000);
            };
        }

        connect();
    </script>
</body>
</html>
