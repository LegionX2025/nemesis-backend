<link href="/static/css/output.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: #f8fafc; 
        color: #0f172a; 
        margin: 0; 
        min-height: 100vh; 
        display: flex; 
        flex-direction: column; 
    }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    /* Vanta Background Container */
    #vanta-bg {
        position: fixed;
        z-index: -1;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    
    /* Glassmorphism overrides for Light Mode */
    .glass-panel {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(15, 23, 42, 0.1);
        border-radius: 12px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        color: #0f172a;
    }
    
    /* Utility for making text readable over background */
    .glass-text-container {
        background: rgba(255,255,255,0.7);
        padding: 2px 6px;
        border-radius: 4px;
        display: inline-block;
    }
</style>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Create Vanta background container if it doesn't exist
        if (!document.getElementById('vanta-bg')) {
            const vantaDiv = document.createElement('div');
            vantaDiv.id = 'vanta-bg';
            document.body.insertBefore(vantaDiv, document.body.firstChild);
        }
        
        try {
            VANTA.NET({
              el: "#vanta-bg",
              mouseControls: true,
              touchControls: true,
              gyroControls: false,
              minHeight: 200.00,
              minWidth: 200.00,
              scale: 1.00,
              scaleMobile: 1.00,
              color: 0x3b82f6,
              backgroundColor: 0xf8fafc,
              points: 12.00,
              maxDistance: 22.00,
              spacing: 18.00
            });
        } catch(e) {
            console.error("Vanta initialization failed", e);
        }
    });
</script>
