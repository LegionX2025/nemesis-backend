<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemesis | Admin Authentication</title>
    {% include 'includes/head_assets.html' %}
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(15, 23, 42, 0.1);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        .cyber-input {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(15, 23, 42, 0.1);
            color: #0f172a;
            transition: all 0.3s ease;
        }
        .cyber-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            outline: none;
        }

        .cyber-btn {
            background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
            color: #ffffff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .cyber-btn:hover {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }
        
        /* Overrides for Light Web3GL Theme */
        main { background: transparent !important; }
    </style>
</head>
<body>
    {% include 'includes/global_nav.html' %}
    
    <main class="flex-grow flex items-center justify-center relative z-10 w-full p-4">
        <div class="glass-panel p-10 rounded-2xl w-full max-w-md mx-auto">
            <div class="text-center mb-8 glass-text-container">
                <i class="fa-solid fa-user-shield text-blue-600 text-4xl mb-4"></i>
                <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 tracking-widest mb-2">NEMESIS</h1>
                <p class="text-sm text-slate-500 font-bold tracking-widest uppercase">Admin Authorization</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Identifier</label>
                    <input type="text" id="username" class="cyber-input w-full px-4 py-3 rounded-lg font-mono shadow-inner" placeholder="Enter Admin ID" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Passcode</label>
                    <input type="password" id="password" class="cyber-input w-full px-4 py-3 rounded-lg font-mono shadow-inner" placeholder="••••••••••••" required>
                </div>
                
                <div id="error-msg" class="hidden text-red-600 font-bold bg-red-50 border border-red-200 p-3 rounded text-sm text-center"></div>

                <button type="submit" class="cyber-btn w-full py-4 rounded-lg mt-4 shadow-md flex justify-center items-center gap-2">
                    Initialize Uplink <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </main>

    {% include 'includes/footer.html' %}

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error-msg');
            
            try {
                // Use relative path for production routing
                const apiUrl = '/api/login';

                const formData = new URLSearchParams();
                formData.append('username', u);
                formData.append('password', p);

                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('nemesis_token', data.access_token);
                    err.classList.add('hidden');
                    window.location.href = '/admin.html';
                } else {
                    err.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${data.detail || 'Access Denied.'}`;
                    err.classList.remove('hidden');
                }
            } catch (error) {
                err.innerHTML = '<i class="fa-solid fa-link-slash"></i> Connection to mainframe failed.';
                err.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
