services:
  - type: web
    name: nemesis-backend
    env: docker
    region: oregon
    plan: starter # Can be changed to 'free' if preferred
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_MONGO_URL
        sync: false # User must provide this securely in the Render dashboard
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: POLYGONSCAN_API_KEY
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: OKLINK_API_KEY
        sync: false
      - key: TATUM_API_KEY
        sync: false
