    <script>
        const CHAIN_LOGOS = {
            'EVM': '<img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" class="w-full h-full object-cover">',
            'BTC': '<img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" class="w-full h-full object-cover">',

            'UNKNOWN': '<i class="fa-solid fa-link text-slate-400 text-sm"></i>'
        };

        function identifyChain(address) {
            if (/^0x[a-fA-F0-9]{40}$/.test(address)) return 'EVM';
            if (/^(1|3)[a-zA-HJ-NP-Z0-9]{25,39}$/.test(address) || /^bc1[a-zA-HJ-NP-Z0-9]{39,59}$/.test(address)) return 'BTC';
            if (/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(address) && !address.startsWith('0x')) return 'SOL';
            return 'UNKNOWN';
        }

        function showGlobalLoader(text) {
            const loader = document.getElementById('global-loader');
            if (document.getElementById('loader-text')) {
                document.getElementById('loader-text').innerText = text;
            }
            loader.classList.remove('hidden');
            loader.classList.add('flex');

        function hideGlobalLoader() {
            const loader = document.getElementById('global-loader');
            loader.classList.add('hidden');
            loader.classList.remove('flex');
        }

        // GodMode WebSocket & UI Logic
        const godmodeToggle = document.getElementById('godmodeToggle');
        const godmodeTerminal = document.getElementById('godmode-terminal');
        const godmodeContent = document.getElementById('godmode-content');
        let godmodeWs = null;

        if (godmodeToggle) {
            godmodeToggle.addEventListener('change', async (e) => {
                const enabled = e.target.checked;
                
                // Toggle server state
                try {
                    await fetch('/api/godmode/toggle', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({enabled: enabled})
                    });
                } catch(err) {
                    console.error("Failed to toggle Godmode", err);
                }

                if (enabled) {
                    connectGodmode();
                } else {
                    if (godmodeWs) godmodeWs.close();
                    godmodeTerminal.classList.add('translate-y-full', 'opacity-0');
                    godmodeTerminal.classList.remove('translate-y-0', 'opacity-100');
                }
            });
        }

        function connectGodmode() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            godmodeWs = new WebSocket(`${protocol}//${window.location.host}/api/godmode/stream`);
            
            godmodeWs.onopen = () => {
                godmodeTerminal.classList.remove('translate-y-full', 'opacity-0');
                godmodeTerminal.classList.add('translate-y-0', 'opacity-100');
                godmodeContent.innerHTML += `<div class="text-emerald-400">Connected to GodMode Streaming API...</div>`;
            };

            godmodeWs.onmessage = (event) => {
                // Ensure terminal is visible
                godmodeTerminal.classList.remove('translate-y-full', 'opacity-0');
                godmodeTerminal.classList.add('translate-y-0', 'opacity-100');
                
                // Append text with rudimentary markdown/newline formatting
                let text = event.data;
                text = text.replace(/
/g, '<br>');
                if (text.includes("```python")) {
                    text = text.replace(/```python/g, '<div class="bg-slate-900/50 p-2 rounded mt-2 border border-slate-700 font-mono text-[10px] text-blue-300">');
                    text = text.replace(/```/g, '</div>');
                }
                
                godmodeContent.innerHTML += `<div class="mb-1">${text}</div>`;
                godmodeContent.scrollTop = godmodeContent.scrollHeight;
            };

            godmodeWs.onclose = () => {
                godmodeContent.innerHTML += `<div class="text-red-400">Connection lost. Reconnecting...</div>`;
                if(godmodeToggle && godmodeToggle.checked) {
                    setTimeout(connectGodmode, 3000);
                }
            };
        }
    </script>

# NEMESIS Enterprise API Documentation

## OmniChain Blockchain Intelligence & Digital Forensics Platform

**Version:** 2.0 Enterprise  
**API Gateway:** Cloudflare Workers Edge (`nemesis-api`)  
**Compute Engine:** FastAPI Intelligence Core  
**Transport:** HTTPS • WebSockets • HTTP/2 • HTTP/3  
**Architecture:** Edge-First • Multi-Cloud • Event-Driven • Zero-Trust  

---

# Overview

The **NEMESIS Enterprise API** provides a unified interface for blockchain intelligence, digital forensics, cryptocurrency tracing, OSINT correlation, darknet intelligence, AI-assisted investigations, and cross-chain entity resolution.

The platform is composed of two major investigative modules:

* **NEMESIS Tracer Engine** — Multi-chain forensic tracing, graph analysis, and transaction intelligence.
* **NEMESIS ID Engine** — Universal entity intelligence, wallet profiling, behavioral analytics, attribution, and knowledge graph construction.

All client requests terminate at the **Cloudflare Edge API Gateway**, where authentication, authorization, caching, observability, telemetry, and request validation are enforced before secure proxying to the FastAPI Intelligence Engine.

---

# Base URLs

* **Production Engine:** `https://nemesis.lionsgate.network`
* **API Gateway Edge:** `https://api.nemesis.lionsgate.network/v1`
* **WebSockets Edge:** `wss://ws.nemesis.lionsgate.network`

---

# Authentication

The NEMESIS API utilizes Zero-Trust authentication architecture. Requests must be authenticated via Bearer tokens (JWT) or Service Account API Keys.

```http
Authorization: Bearer <token>
```
or
```http
X-Nemesis-API-Key: <api_key>
```

---

# Core Workflows

## Initiation

Investigations are initiated by generating a trace operation. A Trace ID is returned asynchronously.

```http
POST /api/trace
```
**Body:**
```json
{
  "address": "0x1234567890abcdef...",
  "chain": "ethereum",
  "max_depth": 3,
  "max_hops": 50
}
```

## Graph Analysis
```http
GET /api/graph/{trace_id}
```
Returns a fully constructed knowledge graph representation in D3.js compatible format for visualization.

## Deep Evidence Analysis
```http
POST /api/deep_evidence
```
Performs advanced forensic analysis using multiple intelligence providers and AI.

Capabilities include: ABI decoding, Contract analysis, Function signature identification, Transaction explanation, Cross-chain correlation, Risk scoring, Behavioral interpretation, AI-generated forensic narrative.

---

# NEMESIS ID Engine

The NEMESIS ID Engine constructs a unified digital identity for blockchain entities. It correlates:
Wallet addresses, Smart contracts, Exchanges, Bridges, Mixers, ENS domains, Darknet identities, OSINT artifacts, Investigation history.

## Search
```http
GET /api/nemesis_id/search
```
Supported query types: Nemesis ID, Wallet Address, Transaction Hash, Trace ID, ENS Domain, Entity Name.

---

# Wallet Intelligence

```http
GET /api/wallet_profile/{address}
```
Returns comprehensive wallet intelligence including: Native balance, Token balances, NFT holdings, Portfolio valuation, Chain activity, Labels, Risk score, Exchange exposure, AML indicators, Sanctions screening, Historical activity.

---

# Deep Blockchain Scraping

```http
GET /api/deep_scrape/{address}
```
Launches the Playwright Intelligence Engine for browser-based acquisition of blockchain explorer data. Collected data includes:
Complete transaction history, Internal transactions, ERC-20/721/1155 transfers, Contract interactions, Gas statistics, Address labels, Explorer metadata.

---

# Darknet Intelligence

```http
GET /api/darknet/search
```
Queries the NEMESIS Darknet Intelligence Repository. Searches include:
Onion services, Threat actor aliases, Cryptocurrency addresses, Email addresses, Usernames, Market listings, Data leaks, Credential dumps, Intelligence reports.

---

# Administrative APIs

Administrative endpoints expose operational capabilities including:

```http
POST /api/login
GET /admin/health
GET /admin/traces
GET /api/admin/cases
POST /api/admin/cases
GET /api/admin/db_stats
GET /api/admin/config
POST /api/admin/config
```

These endpoints require administrative authentication and are intended for internal operational use.

---

# Cloudflare Edge Services

The API is deployed behind Cloudflare Enterprise and integrates with:
Workers, KV, D1, R2, Durable Objects, Queues, Browser Rendering, AI Gateway, Analytics Engine, Zero Trust, WAF, API Shield, Rate Limiting, Smart Placement, Logpush, Observability, Vectorize (planned), Hyperdrive (planned).
