<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMESIS | Design 4: Segmented Wafer Layering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/force-graph@1.43.3/dist/force-graph.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; overflow: hidden; margin:0; padding:0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .graph-wrapper canvas { border-radius: 0.5rem; outline: none; }
        #html-node-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        
        .html-node { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; transition: transform 0.1s linear; cursor: pointer; z-index: 10; }

        /* ---------------------------------------------------- */
        /* DESIGN 4: SEGMENTED WAFER LAYERING                   */
        /* ---------------------------------------------------- */
        .wafer-node {
            width: 140px;
            display: flex; flex-direction: column;
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            border: 1px solid #cbd5e1;
        }

        .html-node.selected .wafer-node {
            box-shadow: 0 0 0 3px #3b82f6, 0 10px 25px rgba(59, 130, 246, 0.4);
            transform: scale(1.05);
        }

        .wafer-top { background: #f8fafc; padding: 6px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; }
        .wafer-mid { background: #0f172a; padding: 6px 10px; text-align: center; color: white; font-weight: 800; font-size: 10px; letter-spacing: 0.5px; }
        .wafer-bot { background: #f1f5f9; padding: 6px 10px; text-align: center; color: #475569; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; }
        
        .node-icon-wrapper { width: 18px; height: 18px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .node-icon-wrapper img { width: 12px; height: 12px; }
        .node-type-badge { font-size: 8px; font-weight: 800; color: #64748b; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col h-screen antialiased text-sm">

    <!-- GLOBAL HEADER -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 flex-shrink-0 z-50">
        <div class="flex items-center gap-3 w-64">
            <i class="fa-solid fa-lion text-3xl text-slate-900"></i>
            <div class="flex flex-col">
                <span class="font-black text-xl tracking-tight leading-none text-slate-900 uppercase">NEMESIS</span>
                <span class="text-[8px] text-slate-500 font-bold tracking-widest uppercase mt-0.5">Segmented Layering UI</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden bg-slate-50 p-6">
        <div class="flex-1 bg-white border border-slate-200 rounded-lg shadow-sm flex flex-col overflow-hidden relative">
            <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="font-bold text-slate-800 ml-2"><i class="fa-solid fa-layer-group text-blue-600 mr-2"></i> Design 4: Segmented Wafer Data View</h2>
            </div>
            
            <div class="flex-1 w-full relative graph-wrapper bg-[#fafafa]">
                <div id="graph-container" class="absolute inset-0"></div>
                <div id="html-node-layer"></div>
            </div>
        </div>
    </main>

    <script>
        const imgs = {
            binance: 'https://cryptologos.cc/logos/bnb-bnb-logo.png',
            usdt: 'https://cryptologos.cc/logos/tether-usdt-logo.png',
            wallet: 'https://cdn-icons-png.flaticon.com/512/855/855279.png',
            eth: 'https://cryptologos.cc/logos/ethereum-eth-logo.png',
            uniswap: 'https://cryptologos.cc/logos/uniswap-uni-logo.png'
        };

        const gData = {
            nodes: [
                { id: 'N1', name: '0x1A2B...9C8D', type: 'WALLET', val: 'ORIGIN', icon: imgs.wallet, bg: '#0f172a' },
                { id: 'N2', name: 'UNISWAP V2', type: 'DEX', val: '$4.3M', icon: imgs.uniswap, bg: '#db2777' },
                { id: 'N3', name: 'BINANCE 14', type: 'CEX', val: '$4.3M', icon: imgs.binance, bg: '#eab308' }
            ],
            links: [
                { source: 'N1', target: 'N2', label: 'ETH (ERC20)', amount: '1,450.00 ETH', hash: '0xabc123...def4' },
                { source: 'N2', target: 'N3', label: 'USDT (ERC20)', amount: '$4,345,100.00', hash: '0x8899aa...bbcc' }
            ]
        };

        let selectedNodeId = null;

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('graph-container');
            
            window.Graph = ForceGraph()(container)
                .graphData(gData)
                .backgroundColor('transparent')
                .dagMode('lr').dagLevelDistance(250) // Left to Right hierarchy
                .nodeColor(() => 'rgba(0,0,0,0)').nodeVal(10)
                
                // --- DESIGN 4: Thick Ribbon Lines ---
                .linkCanvasObjectMode(() => 'after')
                .linkCanvasObject((link, ctx, globalScale) => {
                    const start = link.source; const end = link.target;
                    if(typeof start !== 'object' || typeof end !== 'object') return;
                    
                    const midX = start.x + (end.x - start.x) / 2;
                    const midY = start.y + (end.y - start.y) / 2;

                    ctx.save();
                    
                    // Draw thick multi-band line
                    ctx.beginPath();
                    ctx.moveTo(start.x, start.y);
                    ctx.lineTo(end.x, end.y);
                    ctx.lineWidth = 12 / globalScale;
                    ctx.strokeStyle = 'rgba(56, 189, 248, 0.2)'; // Light blue thick base
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(start.x, start.y);
                    ctx.lineTo(end.x, end.y);
                    ctx.lineWidth = 2 / globalScale;
                    ctx.strokeStyle = '#0ea5e9'; // Solid core
                    ctx.stroke();

                    // Text
                    ctx.translate(midX, midY - 15);
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

                    ctx.font = 'bold 8px JetBrains Mono'; ctx.fillStyle = '#64748b';
                    ctx.fillText(link.label, 0, -5);
                    ctx.font = 'bold 10px Inter'; ctx.fillStyle = '#ef4444';
                    ctx.fillText('↓ ' + link.amount, 0, 8);

                    ctx.restore();
                })
                .linkColor(() => 'transparent') // Hide native link, handled in CanvasObject
                .linkDirectionalParticles(3)
                .linkDirectionalParticleWidth(4)
                .linkDirectionalParticleColor(() => '#0284c7')
                
                .onRenderFramePre(() => {
                    gData.nodes.forEach(node => {
                        const el = document.getElementById(`html-node-${node.id}`);
                        if (el) {
                            const { x, y } = Graph.graph2ScreenCoords(node.x, node.y);
                            el.style.left = `${x}px`; el.style.top = `${y}px`;
                        }
                    });
                });

            // Populate HTML Nodes
            const layer = document.getElementById('html-node-layer');
            gData.nodes.forEach(node => {
                const el = document.createElement('div');
                el.id = `html-node-${node.id}`;
                el.className = 'html-node';
                el.onclick = () => {
                    document.querySelectorAll('.html-node').forEach(e => e.classList.remove('selected'));
                    el.classList.add('selected');
                };
                
                el.innerHTML = `
                    <div class="wafer-node">
                        <div class="wafer-top">
                            <div class="node-icon-wrapper"><img src="${node.icon}"></div>
                            <div class="node-type-badge">${node.type}</div>
                        </div>
                        <div class="wafer-mid" style="background-color: ${node.bg}">${node.val}</div>
                        <div class="wafer-bot">${node.name}</div>
                    </div>
                `;
                layer.appendChild(el);
            });

            window.addEventListener('resize', () => { Graph.width(container.clientWidth).height(container.clientHeight); });
        });
    </script>
</body>
</html>
