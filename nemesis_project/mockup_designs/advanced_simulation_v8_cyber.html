<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMESIS | Design 5: Integrated Multi-Hop (Cyber Hardware)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/force-graph@1.43.3/dist/force-graph.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; overflow: hidden; margin:0; padding:0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .graph-wrapper canvas { border-radius: 0.5rem; outline: none; }
        #html-node-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        
        .html-node { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; transition: transform 0.1s linear; cursor: pointer; z-index: 10; }

        /* ---------------------------------------------------- */
        /* DESIGN 5: CYBER HARDWARE CHIP                        */
        /* ---------------------------------------------------- */
        .chip-node {
            width: 70px; height: 70px;
            background: #1e293b;
            border-radius: 8px;
            position: relative;
            box-shadow: inset 0 0 0 2px #334155, 0 10px 15px -3px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }

        /* Gold Circuit Traces on edges */
        .chip-node::before {
            content: ''; position: absolute; inset: -6px; border: 2px dashed #ca8a04; border-radius: 12px; z-index: -1; opacity: 0.5;
        }

        .chip-inner {
            width: 50px; height: 50px;
            background: #0f172a;
            border-radius: 4px;
            border: 1px solid #eab308; /* Gold rim */
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .html-node.selected .chip-node {
            box-shadow: inset 0 0 0 2px #eab308, 0 0 30px rgba(234, 179, 8, 0.4);
        }
        .html-node.selected .chip-node::before {
            border: 2px solid #eab308; opacity: 1; animation: pulseGold 1.5s infinite;
        }

        @keyframes pulseGold { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .node-label-container { position: absolute; top: calc(100% + 15px); left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; width: max-content; }
        .node-value { font-weight: 800; font-size: 12px; color: #0f172a; }
        .node-name { font-family: 'JetBrains Mono', monospace; color: #64748b; font-size: 10px; font-weight: 700; margin-top: 2px; }
    </style>
</head>
<body class="flex flex-col h-screen antialiased text-sm">

    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 flex-shrink-0 z-50">
        <div class="flex items-center gap-3 w-64">
            <i class="fa-solid fa-lion text-3xl text-slate-900"></i>
            <div class="flex flex-col">
                <span class="font-black text-xl tracking-tight leading-none text-slate-900 uppercase">NEMESIS</span>
                <span class="text-[8px] text-slate-500 font-bold tracking-widest uppercase mt-0.5">Cyber Hardware UI</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden bg-slate-50 p-6">
        <div class="flex-1 bg-white border border-slate-200 rounded-lg shadow-sm flex flex-col overflow-hidden relative">
            <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="font-bold text-slate-800 ml-2"><i class="fa-solid fa-microchip text-yellow-500 mr-2"></i> Design 5: Integrated Multi-Hop (Hardware)</h2>
            </div>
            
            <div class="flex-1 w-full relative graph-wrapper bg-[#e2e8f0]">
                <!-- Background grid to look like blueprint/pcb -->
                <div class="absolute inset-0 opacity-10" style="background-image: linear-gradient(#334155 1px, transparent 1px), linear-gradient(90deg, #334155 1px, transparent 1px); background-size: 20px 20px;"></div>
                
                <div id="graph-container" class="absolute inset-0"></div>
                <div id="html-node-layer"></div>
            </div>
        </div>
    </main>

    <script>
        const imgs = {
            binance: 'https://cryptologos.cc/logos/bnb-bnb-logo.png',
            usdt: 'https://cryptologos.cc/logos/tether-usdt-logo.png',
            wallet: 'https://cdn-icons-png.flaticon.com/512/855/855279.png',
            eth: 'https://cryptologos.cc/logos/ethereum-eth-logo.png',
            uniswap: 'https://cryptologos.cc/logos/uniswap-uni-logo.png'
        };

        const gData = {
            nodes: [
                { id: 'N1', name: '0x1A2B...9C8D', val: 'HACKER ORIGIN', icon: imgs.wallet },
                { id: 'N2', name: 'UNISWAP V2', val: 'DEX MIXER', icon: imgs.uniswap },
                { id: 'N3', name: 'BINANCE 14', val: 'TERMINAL NODE', icon: imgs.binance }
            ],
            links: [
                { source: 'N1', target: 'N2', label: 'ETH (ERC20)', amount: '1,450.00 ETH' },
                { source: 'N2', target: 'N3', label: 'USDT (ERC20)', amount: '$4,345,100.00' }
            ]
        };

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('graph-container');
            
            window.Graph = ForceGraph()(container)
                .graphData(gData)
                .backgroundColor('transparent')
                .dagMode('lr').dagLevelDistance(250) // LR for PCB flow
                .nodeColor(() => 'rgba(0,0,0,0)').nodeVal(10)
                
                // --- PCB Trace Style Links ---
                .linkCanvasObjectMode(() => 'after')
                .linkCanvasObject((link, ctx, globalScale) => {
                    const start = link.source; const end = link.target;
                    if(typeof start !== 'object' || typeof end !== 'object') return;
                    
                    const midX = start.x + (end.x - start.x) / 2;
                    const midY = start.y + (end.y - start.y) / 2;

                    ctx.save();
                    
                    // Circuit Trace path
                    ctx.beginPath();
                    ctx.moveTo(start.x, start.y);
                    ctx.lineTo(end.x, end.y);
                    
                    ctx.lineWidth = 2 / globalScale;
                    ctx.strokeStyle = '#0284c7'; // Blue trace
                    ctx.stroke();

                    // Gold pads at ends
                    ctx.fillStyle = '#eab308';
                    ctx.beginPath(); ctx.arc(start.x, start.y, 4/globalScale, 0, 2*Math.PI); ctx.fill();
                    ctx.beginPath(); ctx.arc(end.x, end.y, 4/globalScale, 0, 2*Math.PI); ctx.fill();

                    // Text
                    ctx.translate(midX, midY - 15);
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.beginPath(); ctx.roundRect(-40, -10, 80, 25, 4); ctx.fill();
                    ctx.lineWidth = 1/globalScale; ctx.strokeStyle='#cbd5e1'; ctx.stroke();

                    ctx.font = 'bold 8px Inter'; ctx.fillStyle = '#64748b';
                    ctx.fillText(link.label, 0, -2);
                    ctx.font = 'bold 9px JetBrains Mono'; ctx.fillStyle = '#ef4444';
                    ctx.fillText(link.amount, 0, 8);

                    ctx.restore();
                })
                .linkColor(() => 'transparent') 
                .linkDirectionalParticles(2)
                .linkDirectionalParticleWidth(3)
                .linkDirectionalParticleColor(() => '#eab308') // gold pulses
                
                .onRenderFramePre(() => {
                    gData.nodes.forEach(node => {
                        const el = document.getElementById(`html-node-${node.id}`);
                        if (el) {
                            const { x, y } = Graph.graph2ScreenCoords(node.x, node.y);
                            el.style.left = `${x}px`; el.style.top = `${y}px`;
                        }
                    });
                });

            // Populate HTML Nodes
            const layer = document.getElementById('html-node-layer');
            gData.nodes.forEach(node => {
                const el = document.createElement('div');
                el.id = `html-node-${node.id}`;
                el.className = 'html-node';
                el.onclick = () => {
                    document.querySelectorAll('.html-node').forEach(e => e.classList.remove('selected'));
                    el.classList.add('selected');
                };
                
                el.innerHTML = `
                    <div class="chip-node">
                        <div class="chip-inner">
                            <img src="${node.icon}" class="w-6 h-6 rounded-full grayscale opacity-80">
                        </div>
                    </div>
                    <div class="node-label-container">
                        <div class="node-value">${node.val}</div>
                        <div class="node-name">${node.name}</div>
                    </div>
                `;
                layer.appendChild(el);
            });

            window.addEventListener('resize', () => { Graph.width(container.clientWidth).height(container.clientHeight); });
        });
    </script>
</body>
</html>
