name = "nemesis-python-worker"
main = "src/index.py"
compatibility_date = "2024-12-01"
compatibility_flags = ["python_workers"]

[observability]
enabled = true

[[kv_namespaces]]
binding = "NEMESIS_KV"
id = "556aa273aeac4b009b559bb215346ce3"
preview_id = "556aa273aeac4b009b559bb215346ce3"

[[d1_databases]]
binding = "DB"
database_name = "nemesis_audit_db"
database_id = "80acedab-33c2-4637-bee7-6b9a1176a463"

[[r2_buckets]]
binding = "NEMESIS_STORAGE"
bucket_name = "nemesis-assets"

[vars]
NODE_ENV = "production"
APP_NAME = "nemesis-platform"
APP_MODE = "production"
AUTO_FAILOVER = "true"
AUTO_RETRY = "true"
RETRY_STRATEGY = "exponential"
MAX_RETRIES = "7"
RETRY_BASE_DELAY_MS = "800"
PARALLEL_FETCH_LIMIT = "12"
NORMALIZE_ALL_NETWORKS = "true"
TRACE_MAX_HOPS = "UNLIMITED"
TRACE_MAX_DEPTH = "UNLIMITED"
AI_ROTATION_ENABLED = "true"
AI_MODEL_ORDER = "gemini-1.5-flash,gemini-1.5-pro,gemini-2.0-flash-exp"
OKLINK_BASE_URL = "https://www.oklink.com"
AUTO_SCRAPE_ENTITIES = "true"
AUTO_LABEL_WALLETS = "true"
OKLINK_LABEL_CONFIDENCE_THRESHOLD = "0.85"
OKLINK_SUPPORTED_CHAINS = "btc,eth,bsc,trx,sol,polygon,avax,arb,op"
OKLINK_MULTI_SEARCH_URL = "https://www.oklink.com/multi-search#key={address}"
OKLINK_DOM_CLASS_SELECTOR = ".wrapper-qoNkf.oklink-ignore-locale"
OKLINK_DOM_REGEX_MATCH = "Exchange:\s*([^.]+)"
OKLINK_CHAIN_ADDRESS_URL = "https://www.oklink.com/{chain}/address/{address}"
OKLINK_STATE_SCRIPT_KEYWORD = "OKX. User"
OKLINK_STATE_JSON_PATH = "appContext.initialProps.store.pageState.tagStore.tagMaps.entityTag"
SCRAPE_URL_BTC = "https://www.oklink.com/btc/address/{address}"
SCRAPE_URL_ETH = "https://etherscan.io/address/{address}"
SCRAPE_URL_BSC = "https://bscscan.com/address/{address}"
SCRAPE_URL_TRX = "https://tronscan.org/#/address/{address}"
SCRAPE_URL_SOL = "https://solscan.io/account/{address}"
SCRAPE_URL_POLYGON = "https://polygonscan.com/address/{address}"
SCRAPE_URL_AVAX = "https://snowtrace.io/address/{address}"
SCRAPE_URL_ARB = "https://arbiscan.io/address/{address}"
SCRAPE_URL_OP = "https://optimistic.etherscan.io/address/{address}"
SCRAPE_URL_XRP = "https://xrpscan.com/account/{address}"
SCRAPE_URL_TERRA = "https://finder.terra.money/mainnet/address/{address}"
SCRAPE_URL_LINEA = "https://lineascan.build/address/{address}"
SCRAPE_URL_CELO = "https://celoscan.io/address/{address}"
SCRAPE_URL_ZKSYNC = "https://explorer.zksync.io/address/{address}"
SCRAPE_URL_STARKNET = "https://starkscan.co/contract/{address}"
ICF_USE_BROWSER_SCRAPER = "true"
SCRAPER_ENGINE = "playwright"
SCRAPER_HEADLESS = "true"
SCRAPER_STEALTH_MODE = "true"
SCRAPER_BYPASS_CLOUDFLARE = "true"
SCRAPER_TIMEOUT_MS = "60000"
SCRAPER_ROTATING_SESSIONS = "true"
SCRAPER_PROXY_ENABLED = "true"
SCRAPER_PROXY_URL = "http://proxy.lionsgate.network:8080"
SCRAPER_TARGET_EXPLORERS = "etherscan.io,bscscan.com,polygonscan.com,tronscan.org,solscan.io,oklink.com,xrpscan.com,snowtrace.io,arbiscan.io,optimistic.etherscan.io,basescan.org,celoscan.io,explorer.zksync.io,starkscan.co,finder.terra.money"
CRAWLER_ENABLED = "true"
CRAWLER_MAX_THREADS = "10"
CRAWLER_TIMEOUT_SECONDS = "30"
CRAWLER_USER_AGENT_ROTATION = "true"
CRAWLER_DB_TYPE = "mongodb"
CRAWLER_EXPORT_FORMAT = "jsonl"
CRAWLER_RATE_LIMIT_MS = "2000"
CRAWLER_ENABLE_ENTITY_EXTRACTION = "true"
CRAWLER_ENABLE_OSINT_LOOKUP = "true"
CRAWLER_MAX_RECORDS_BUFFER = "5000"
CRAWLER_WEBSOCKET_ENDPOINT = "ws://localhost:3000/api/crawler/stream_endpoint"
TOR_SOCKS_PORT = "9050"
TOR_CONTROL_PORT = "9051"
TOR_AUTO_START = "true"
ENABLE_COURT_EXPORT = "true"
ENABLE_AFFIDAVIT_GENERATION = "true"
ENABLE_EXHIBIT_HASHING = "true"
REDACT_WALLETS_IN_PRELIMINARY = "true"
CHAIN_OF_CUSTODY_STRICT = "true"
