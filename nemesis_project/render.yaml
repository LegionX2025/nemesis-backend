services:
  - type: web
    name: nemesis-backend
    env: python
    region: ohio
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: OKLINK_API_KEY
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
