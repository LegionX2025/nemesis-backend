name = "nemesis-api"
main = "src/index.ts"
compatibility_date = "2024-02-08"

# ============================================================================
# KV NAMESPACES
# ============================================================================
[[kv_namespaces]]
binding = "NEMESIS_CACHE"
id = "YOUR_ID_FOR_NEMESIS_CACHE"
[[kv_namespaces]]
binding = "ENTITY_CACHE"
id = "YOUR_ID_FOR_ENTITY_CACHE"
[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "YOUR_ID_FOR_SESSION_CACHE"
[[kv_namespaces]]
binding = "TOKEN_CACHE"
id = "YOUR_ID_FOR_TOKEN_CACHE"
[[kv_namespaces]]
binding = "OSINT_CACHE"
id = "YOUR_ID_FOR_OSINT_CACHE"

# ============================================================================
# D1 DATABASE
# ============================================================================
[[d1_databases]]
binding = "DB"
database_name = "nemesis"
database_id = "73ef6e7d-9499-4d59-a190-ae7220873a71"

# ============================================================================
# R2 BUCKETS
# ============================================================================
[[r2_buckets]]
binding = "REPORTS"
bucket_name = "nemesis-reports"
[[r2_buckets]]
binding = "EVIDENCE"
bucket_name = "nemesis-evidence"
[[r2_buckets]]
binding = "SCREENSHOTS"
bucket_name = "nemesis-screenshots"
[[r2_buckets]]
binding = "EXPORTS"
bucket_name = "nemesis-exports"

# ============================================================================
# QUEUES
# ============================================================================
[[queues.producers]]
binding = "TRACE_QUEUE"
queue = "wallet-tracing"
[[queues.producers]]
binding = "ENTITY_QUEUE"
queue = "entity-resolution"
[[queues.producers]]
binding = "AI_QUEUE"
queue = "gemini-analysis"
[[queues.producers]]
binding = "REPORT_QUEUE"
queue = "report-generation"
[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "notifications"

[[queues.consumers]]
queue = "wallet-tracing"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

# ============================================================================
# DURABLE OBJECTS & WORKFLOWS
# ============================================================================
[[workflows]]
name = "nemesis-workflow"
binding = "TRACE_WORKFLOW"
class_name = "TraceWorkflow"

[[durable_objects.bindings]]
name = "TRACE_COORDINATOR"
class_name = "TraceCoordinator"

[[durable_objects.bindings]]
name = "REALTIME_MANAGER"
class_name = "RealtimeManager"

[[durable_objects.bindings]]
name = "ADMIN_CONSOLE"
class_name = "AdminConsole"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TraceCoordinator", "RealtimeManager", "AdminConsole"]

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
[vars]
PYTHON_BACKEND_URL = "https://nemesis-tunnel.trycloudflare.com" # TODO: Update this in Cloudflare dashboard
