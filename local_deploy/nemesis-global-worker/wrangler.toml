name = "nemesis-api"
main = "src/index.ts"
compatibility_date = "2024-02-08"
node_compat = true



# ============================================================================
# KV NAMESPACES
# ============================================================================
[[kv_namespaces]]
binding = "NEMESIS_CACHE"
id = "f4099ea1458e4e62ba838734f172846f"
[[kv_namespaces]]
binding = "ENTITY_CACHE"
id = "817961173773498d9e4715b3479fc66d"
[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "7fbab659456242db8c27082fcdb0d4b1"
[[kv_namespaces]]
binding = "TOKEN_CACHE"
id = "2c35b6ff21d14830b3ae93ee4e6006c2"
[[kv_namespaces]]
binding = "OSINT_CACHE"
id = "5558ace53efa4a0aa37dc035b17c256a"

# ============================================================================
# D1 DATABASE
# ============================================================================
[[d1_databases]]
binding = "DB"
database_name = "nemesis"
database_id = "73ef6e7d-9499-4d59-a190-ae7220873a71"

# ============================================================================
# R2 BUCKETS
# ============================================================================
[[r2_buckets]]
binding = "REPORTS"
bucket_name = "nemesis-reports"
[[r2_buckets]]
binding = "EVIDENCE"
bucket_name = "nemesis-evidence"
[[r2_buckets]]
binding = "SCREENSHOTS"
bucket_name = "nemesis-screenshots"
[[r2_buckets]]
binding = "EXPORTS"
bucket_name = "nemesis-exports"

# ============================================================================
# QUEUES
# ============================================================================
[[queues.producers]]
binding = "TRACE_QUEUE"
queue = "wallet-tracing"
[[queues.producers]]
binding = "ENTITY_QUEUE"
queue = "entity-resolution"
[[queues.producers]]
binding = "AI_QUEUE"
queue = "gemini-analysis"
[[queues.producers]]
binding = "REPORT_QUEUE"
queue = "report-generation"
[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "notifications"

[[queues.consumers]]
queue = "wallet-tracing"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

# ============================================================================
# DURABLE OBJECTS & WORKFLOWS
# ============================================================================

[[durable_objects.bindings]]
name = "TRACE_COORDINATOR"
class_name = "TraceCoordinator"

[[durable_objects.bindings]]
name = "REALTIME_MANAGER"
class_name = "RealtimeManager"

[[durable_objects.bindings]]
name = "ADMIN_CONSOLE"
class_name = "AdminConsole"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TraceCoordinator", "RealtimeManager", "AdminConsole"]
deleted_classes = ["TraceSessionDO"]

# ============================================================================
# HYPERDRIVE (POSTGRES EDGE ACCELERATOR)
# ============================================================================
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "2bf62864eaf64708b5a349169d6efc7e"
localConnectionString = "postgresql://admin:!Nemesis2026@ep-morning-glitter-adpz0uqn-pooler.c-2.us-east-1.aws.neon.tech:5432/intelligence?sslmode=require"

