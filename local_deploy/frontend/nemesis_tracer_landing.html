    <script>
        const CHAINS = {
            BTC: { regex: /^(bc1|[13])[a-zA-HJ-NP-Z0-9]{25,39}$/, name: 'Bitcoin', logo: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
            ETH: { regex: /^0x[a-fA-F0-9]{40}$/, name: 'Ethereum / EVM', logo: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' },
            TRX: { regex: /^T[A-Za-z1-9]{33}$/, name: 'Tron', logo: 'https://cryptologos.cc/logos/tron-trx-logo.png' },
            XRP: { regex: /^r[0-9a-zA-Z]{24,34}$/, name: 'Ripple', logo: 'https://cryptologos.cc/logos/xrp-xrp-logo.png' },
            SOL: { regex: /^[1-9A-HJ-NP-Za-km-z]{32,44}$/, name: 'Solana', logo: 'https://cryptologos.cc/logos/solana-sol-logo.png' }
        };

        function detectChain(address) {
            const logoContainer = document.getElementById('chain-logo-container');
            const textContainer = document.getElementById('chain-detected-text');
            
            let detected = null;
            let val = address.trim().split('\n')[0]; // Grab first line

            if (val.length === 0) {
                resetLogo();
                return;
            }

            // Quick pattern matching
            if (CHAINS.ETH.regex.test(val)) detected = CHAINS.ETH;
            else if (CHAINS.BTC.regex.test(val)) detected = CHAINS.BTC;
            else if (CHAINS.SOL.regex.test(val)) detected = CHAINS.SOL;
            else if (CHAINS.TRX.regex.test(val)) detected = CHAINS.TRX;

            if (detected) {
                logoContainer.innerHTML = `<img src="${detected.logo}" class="w-6 h-6 logo-enter drop-shadow-md">`;
                textContainer.innerHTML = `<i class="fa-solid fa-check-circle mr-1"></i> ${detected.name} Network Detected`;
                textContainer.classList.remove('hidden');
                textContainer.classList.remove('text-red-500');
                textContainer.classList.add('text-purple-600');
            } else {
                logoContainer.innerHTML = `<i class="fa-solid fa-circle-question text-amber-500 logo-enter"></i>`;
                textContainer.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1"></i> Unknown Chain Format`;
                textContainer.classList.remove('hidden');
                textContainer.classList.remove('text-purple-600');
                textContainer.classList.add('text-red-500');
            }
        }

        function resetLogo() {
            document.getElementById('chain-logo-container').innerHTML = `<i class="fa-solid fa-magnifying-glass text-slate-500 logo-enter"></i>`;
            document.getElementById('chain-detected-text').classList.add('hidden');
        }

        function startTracing() {
            const val = document.getElementById('wallet_address').value.trim();
            if (!val) return;

            // Gather additional inputs
            const lossAmount = document.getElementById('loss_amount').value;
            const assetType = document.getElementById('asset_type').value;
            const networksSelect = document.getElementById('networks');
            const selectedNetworks = Array.from(networksSelect.selectedOptions).map(opt => opt.value).join(',');
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;

            document.getElementById('input-container').style.display = 'none';
            document.getElementById('global-loader').style.display = 'flex';
            
            const texts = [
                "Deploying Distributed Tracer Swarm...",
                "Mapping Peer-to-Peer Fund Topologies...",
                "Bypassing Sub-Graph Limitations...",
                "Running Multi-Tier BFS Graph Analysis...",
                "Synchronizing WebSockets..."
            ];
            let i = 0;
            const textEl = document.getElementById('loader-text');
            const interval = setInterval(() => {
                if (i < texts.length) {
                    textEl.innerText = texts[i];
                    i++;
                }
            }, 800);

            // Redirect to dashboard with address attached + new params
            setTimeout(() => {
                clearInterval(interval);
                let query = `?address=${encodeURIComponent(val)}&loss=${encodeURIComponent(lossAmount)}&asset=${encodeURIComponent(assetType)}&networks=${encodeURIComponent(selectedNetworks)}&start=${encodeURIComponent(startDate)}&end=${encodeURIComponent(endDate)}`;
                window.location.href = `/nemesis_tracer.html${query}`;
            }, 4000);
        }
    </script>

<script>
    (function() {
        if (window._nemesisLoaderInitialized) return;
        window._nemesisLoaderInitialized = true;
        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            const loader = document.getElementById('global-ajax-loader');
            if (loader) loader.style.display = 'flex';
            try {
                const response = await originalFetch.apply(this, args);
                return response;
            } finally {
                if (loader) loader.style.display = 'none';
            }
        };
    })();
