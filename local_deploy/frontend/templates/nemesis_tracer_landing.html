<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMESIS TRACER | OmniChain Flow Analysis</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/nemesis-light.css">

    <style>
        body { 
            background-color: #f8fafc !important; 
            color: #0f172a !important; 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        #quantum-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        
        /* Glassmorphism Input Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.9) !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            box-shadow: 0 15px 50px rgba(168, 85, 247, 0.1);
        }

        /* Input styling */
        input, select, textarea {
            background: rgba(255, 255, 255, 0.9) !important;
            border: 1px solid rgba(203, 213, 225, 0.8) !important;
            color: #0f172a !important;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: #a855f7 !important;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15) !important;
        }

        /* Global Loader */
        #global-loader { 
            position: fixed; inset: 0; background: rgba(248, 250, 252, 0.98); 
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.4s ease; 
        }
        .cyber-ring { 
            width: 120px; height: 120px; border: 3px solid transparent; 
            border-top-color: #a855f7; border-right-color: #a855f7; border-radius: 50%; 
            animation: spin 1s linear infinite; box-shadow: 0 0 30px rgba(168, 85, 247, 0.1); position: relative; 
        }
        .cyber-ring::before { 
            content:''; position:absolute; inset: 10px; border: 3px solid transparent; 
            border-left-color: #3b82f6; border-bottom-color: #3b82f6; border-radius: 50%; 
            animation: spin 2s linear infinite reverse; 
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .logo-enter {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4 relative">

    <!-- WebGL Particle Background -->
    <canvas id="quantum-bg"></canvas>

    <!-- Active Loader Overlay -->
    <div id="global-loader" style="display: none;">
        <div class="cyber-ring mb-8"></div>
        <h2 class="text-[#0f172a] font-black text-2xl tracking-widest uppercase">Initializing Tracer Graph</h2>
        <p class="text-purple-600 font-mono text-xs uppercase tracking-widest mt-3" id="loader-text">Booting OmniChain Flow Analysis Engine...</p>
    </div>

    <!-- Main Input Card -->
    <div class="glass-card rounded-2xl w-full max-w-2xl p-8 md:p-12 relative overflow-hidden" id="input-container">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-purple-100 rounded-full blur-3xl opacity-50"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-blue-100 rounded-full blur-3xl opacity-50"></div>

        <div class="relative z-10">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-purple-50 border border-purple-100 shadow-sm mb-4">
                    <i class="fa-solid fa-diagram-project text-purple-600 text-3xl"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-2">NEMESIS TRACER</h1>
                <p class="text-slate-500 font-mono text-sm uppercase tracking-widest">Real-time OmniChain Fund Flow Analysis</p>
            </div>

            <form id="searchForm" class="space-y-4" onsubmit="event.preventDefault(); startTracing();">
                <!-- Main Input Textarea -->
                <div class="relative">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">Seed Addresses / TX Hashes (One per line)</label>
                    <div class="relative flex items-start">
                        <!-- Chain Logo Display -->
                        <div id="chain-logo-container" class="absolute left-4 top-4 w-6 h-6 flex items-center justify-center transition-all duration-300">
                            <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
                        </div>
                        <textarea id="wallet_address" rows="3" class="w-full pl-14 pr-4 py-4 rounded-xl transition resize-none" placeholder="0x...&#10;bc1...&#10;0xabc..." autocomplete="off" oninput="detectChain(this.value)" required></textarea>
                    </div>
                    <p id="chain-detected-text" class="text-[10px] text-purple-600 font-mono font-bold mt-2 ml-1 hidden uppercase tracking-wider popIn"></p>
                </div>
                
                <!-- Total Loss and Asset Type -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">Total Loss Assets</label>
                        <input type="number" id="loss_amount" class="w-full px-4 py-3 rounded-xl transition" placeholder="e.g. 150000" min="0">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">Asset Type</label>
                        <select id="asset_type" class="w-full px-4 py-3 rounded-xl transition text-slate-700">
                            <option value="ALL_TOKENS" selected>All Tokens & Native Assets</option>
                            <option value="USD">USD Value ($)</option>
                            <option value="STABLECOINS">All Stablecoins (USDT, USDC, DAI)</option>
                            <option value="BTC">Bitcoin (BTC)</option>
                            <option value="ETH">Ethereum (ETH)</option>
                            <option value="USDT">Tether (USDT)</option>
                            <option value="USDC">USD Coin (USDC)</option>
                            <option value="DAI">Dai (DAI)</option>
                            <option value="BNB">BNB (BSC)</option>
                            <option value="SOL">Solana (SOL)</option>
                            <option value="XRP">Ripple (XRP)</option>
                            <option value="MATIC">Polygon (MATIC)</option>
                            <option value="AVAX">Avalanche (AVAX)</option>
                        </select>
                    </div>
                </div>

                <!-- Chains / Networks -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">Networks to Trace</label>
                    <select id="networks" class="w-full px-4 py-3 rounded-xl transition text-slate-700" multiple size="4">
                        <option value="ALL" selected>OmniChain (Auto-Detect All)</option>
                        <option value="ETHEREUM">Ethereum (ETH)</option>
                        <option value="BITCOIN">Bitcoin (BTC)</option>
                        <option value="SOLANA">Solana (SOL)</option>
                        <option value="TRON">Tron (TRX)</option>
                        <option value="BSC">Binance Smart Chain (BSC)</option>
                        <option value="POLYGON">Polygon (MATIC)</option>
                        <option value="ARBITRUM">Arbitrum (ARB)</option>
                        <option value="OPTIMISM">Optimism (OP)</option>
                        <option value="BASE">Base</option>
                        <option value="AVALANCHE">Avalanche (AVAX)</option>
                        <option value="RIPPLE">Ripple (XRP)</option>
                        <option value="CELO">Celo</option>
                        <option value="LINEA">Linea</option>
                        <option value="TERRA">Terra</option>
                        <option value="ZKSYNC">zkSync</option>
                        <option value="STARKNET">Starknet</option>
                    </select>
                    <p class="text-[10px] text-slate-400 font-mono mt-1 ml-1">Hold Ctrl (Windows) or Command (Mac) to select multiple.</p>
                </div>

                <!-- Date Range -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">Start Date (Optional)</label>
                        <input type="date" id="start_date" class="w-full px-4 py-3 rounded-xl transition text-slate-700">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">End Date (Optional)</label>
                        <input type="date" id="end_date" class="w-full px-4 py-3 rounded-xl transition text-slate-700">
                    </div>
                </div>

                <div class="flex justify-center mt-4">
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-mono font-bold py-3.5 px-6 rounded-xl shadow-lg transition text-sm uppercase tracking-widest flex items-center justify-center gap-3">
                        <i class="fa-solid fa-satellite-dish text-purple-400"></i> Deploy Swarm Tracker
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const CHAINS = {
            BTC: { regex: /^(bc1|[13])[a-zA-HJ-NP-Z0-9]{25,39}$/, name: 'Bitcoin', logo: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
            ETH: { regex: /^0x[a-fA-F0-9]{40}$/, name: 'Ethereum / EVM', logo: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' },
            SOL: { regex: /^[1-9A-HJ-NP-Za-km-z]{32,44}$/, name: 'Solana', logo: 'https://cryptologos.cc/logos/solana-sol-logo.png' },
            TRX: { regex: /^T[A-Za-z1-9]{33}$/, name: 'Tron', logo: 'https://cryptologos.cc/logos/tron-trx-logo.png' },
            XRP: { regex: /^r[0-9a-zA-Z]{24,34}$/, name: 'Ripple', logo: 'https://cryptologos.cc/logos/xrp-xrp-logo.png' }
        };

        function detectChain(address) {
            const logoContainer = document.getElementById('chain-logo-container');
            const textContainer = document.getElementById('chain-detected-text');
            
            let detected = null;
            let val = address.trim().split('\n')[0]; // Grab first line

            if (val.length === 0) {
                resetLogo();
                return;
            }

            // Quick pattern matching
            if (CHAINS.ETH.regex.test(val)) detected = CHAINS.ETH;
            else if (CHAINS.BTC.regex.test(val)) detected = CHAINS.BTC;
            else if (CHAINS.SOL.regex.test(val)) detected = CHAINS.SOL;
            else if (CHAINS.TRX.regex.test(val)) detected = CHAINS.TRX;

            if (detected) {
                logoContainer.innerHTML = `<img src="${detected.logo}" class="w-6 h-6 logo-enter drop-shadow-md">`;
                textContainer.innerHTML = `<i class="fa-solid fa-check-circle mr-1"></i> ${detected.name} Network Detected`;
                textContainer.classList.remove('hidden');
                textContainer.classList.remove('text-red-500');
                textContainer.classList.add('text-purple-600');
            } else {
                logoContainer.innerHTML = `<i class="fa-solid fa-circle-question text-amber-500 logo-enter"></i>`;
                textContainer.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1"></i> Unknown Chain Format`;
                textContainer.classList.remove('hidden');
                textContainer.classList.remove('text-purple-600');
                textContainer.classList.add('text-red-500');
            }
        }

        function resetLogo() {
            document.getElementById('chain-logo-container').innerHTML = `<i class="fa-solid fa-magnifying-glass text-slate-400 logo-enter"></i>`;
            document.getElementById('chain-detected-text').classList.add('hidden');
        }

        function startTracing() {
            const val = document.getElementById('wallet_address').value.trim();
            if (!val) return;

            // Gather additional inputs
            const lossAmount = document.getElementById('loss_amount').value;
            const assetType = document.getElementById('asset_type').value;
            const networksSelect = document.getElementById('networks');
            const selectedNetworks = Array.from(networksSelect.selectedOptions).map(opt => opt.value).join(',');
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;

            document.getElementById('input-container').style.display = 'none';
            document.getElementById('global-loader').style.display = 'flex';
            
            const texts = [
                "Deploying Distributed Tracer Swarm...",
                "Mapping Peer-to-Peer Fund Topologies...",
                "Bypassing Sub-Graph Limitations...",
                "Running Multi-Tier BFS Graph Analysis...",
                "Synchronizing WebSockets..."
            ];
            let i = 0;
            const textEl = document.getElementById('loader-text');
            const interval = setInterval(() => {
                if (i < texts.length) {
                    textEl.innerText = texts[i];
                    i++;
                }
            }, 800);

            // Redirect to dashboard with address attached + new params
            setTimeout(() => {
                clearInterval(interval);
                let query = `?address=${encodeURIComponent(val)}&loss=${encodeURIComponent(lossAmount)}&asset=${encodeURIComponent(assetType)}&networks=${encodeURIComponent(selectedNetworks)}&start=${encodeURIComponent(startDate)}&end=${encodeURIComponent(endDate)}`;
                window.location.href = `/nemesis_tracer.html${query}`;
            }, 4000);
        }
    </script>
    <script src="/static/js/particles.js"></script>
</body>
</html>
