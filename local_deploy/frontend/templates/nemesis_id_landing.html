<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMESIS ID | Identity Reconstruction</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/nemesis-light.css">

    <style>
        body { 
            background-color: #f8fafc !important; 
            color: #0f172a !important; 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        #quantum-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        
        /* Glassmorphism Input Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.9) !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            box-shadow: 0 15px 50px rgba(59, 130, 246, 0.1);
        }

        /* Input styling */
        input {
            background: rgba(255, 255, 255, 0.9) !important;
            border: 1px solid rgba(203, 213, 225, 0.8) !important;
            color: #0f172a !important;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }
        input:focus {
            outline: none !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15) !important;
        }

        /* Global Loader */
        #global-loader { 
            position: fixed; inset: 0; background: rgba(248, 250, 252, 0.98); 
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.4s ease; 
        }
        .cyber-ring { 
            width: 120px; height: 120px; border: 3px solid transparent; 
            border-top-color: #3b82f6; border-right-color: #3b82f6; border-radius: 50%; 
            animation: spin 1s linear infinite; box-shadow: 0 0 30px rgba(37, 99, 235, 0.1); position: relative; 
        }
        .cyber-ring::before { 
            content:''; position:absolute; inset: 10px; border: 3px solid transparent; 
            border-left-color: #8b5cf6; border-bottom-color: #8b5cf6; border-radius: 50%; 
            animation: spin 2s linear infinite reverse; 
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .logo-enter {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4 relative">

    <!-- WebGL Particle Background -->
    <canvas id="quantum-bg"></canvas>

    <!-- Active Loader Overlay -->
    <div id="global-loader" style="display: none;">
        <div class="cyber-ring mb-8"></div>
        <h2 class="text-[#0f172a] font-black text-2xl tracking-widest uppercase">Initializing Omni-Graph</h2>
        <p class="text-blue-600 font-mono text-xs uppercase tracking-widest mt-3" id="loader-text">Fusing Blockchain, OSINT & Identity Vectors...</p>
    </div>

    <!-- Main Input Card -->
    <div class="glass-card rounded-2xl w-full max-w-2xl p-8 md:p-12 relative overflow-hidden" id="input-container">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-100 rounded-full blur-3xl opacity-50"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-purple-100 rounded-full blur-3xl opacity-50"></div>

        <div class="relative z-10">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 border border-blue-100 shadow-sm mb-4">
                    <i class="fa-solid fa-fingerprint text-blue-600 text-3xl"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-2">NEMESIS ID</h1>
                <p class="text-slate-500 font-mono text-sm uppercase tracking-widest">Multi-Domain Intelligence Reconstruction</p>
            </div>

            <form id="searchForm" onsubmit="event.preventDefault(); startReconstruction();">
                <div class="mb-6 relative">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 font-mono">Target Subject Identity (Address)</label>
                    <div class="relative flex items-center">
                        <!-- Chain Logo Display -->
                        <div id="chain-logo-container" class="absolute left-4 w-6 h-6 flex items-center justify-center transition-all duration-300">
                            <i class="fa-solid fa-magnifying-glass text-slate-600"></i>
                        </div>
                        
                        <input type="text" id="wallet_address" class="w-full pl-14 pr-14 py-4 rounded-xl transition" placeholder="e.g. 0x..." autocomplete="off" oninput="detectChain(this.value)" required>
                        
                        <button type="submit" class="absolute right-3 bg-blue-600 hover:bg-blue-700 text-slate-900 p-2 rounded-lg transition shadow-md shadow-blue-600/20">
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                    <p id="chain-detected-text" class="text-[10px] text-blue-600 font-mono font-bold mt-2 ml-1 hidden uppercase tracking-wider popIn"></p>
                </div>
                
                <div class="flex justify-center">
                    <button type="button" onclick="startReconstruction()" class="w-full bg-white hover:bg-slate-50 text-slate-900 font-mono font-bold py-3.5 px-6 rounded-xl shadow-lg transition text-sm uppercase tracking-widest flex items-center justify-center gap-3">
                        <i class="fa-solid fa-radar text-blue-400"></i> Generate Intelligence Dossier
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const CHAINS = {
            ETH: { regex: /^0x[a-fA-F0-9]{40}$/, name: 'Ethereum / EVM', logo: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' },
            BTC: { regex: /^(bc1|[13])[a-zA-HJ-NP-Z0-9]{25,39}$/, name: 'Bitcoin', logo: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
            SOL: { regex: /^[1-9A-HJ-NP-Za-km-z]{32,44}$/, name: 'Solana', logo: 'https://cryptologos.cc/logos/solana-sol-logo.png' },
            TRX: { regex: /^T[A-Za-z1-9]{33}$/, name: 'Tron', logo: 'https://cryptologos.cc/logos/tron-trx-logo.png' }
        };

        function detectChain(address) {
            const logoContainer = document.getElementById('chain-logo-container');
            const textContainer = document.getElementById('chain-detected-text');
            
            let detected = null;
            let val = address.trim();

            if (val.length === 0) {
                resetLogo();
                return;
            }

            // Quick pattern matching
            if (CHAINS.ETH.regex.test(val)) detected = CHAINS.ETH;
            else if (CHAINS.BTC.regex.test(val)) detected = CHAINS.BTC;
            else if (CHAINS.SOL.regex.test(val)) detected = CHAINS.SOL;
            else if (CHAINS.TRX.regex.test(val)) detected = CHAINS.TRX;

            if (detected) {
                logoContainer.innerHTML = `<img src="${detected.logo}" class="w-6 h-6 logo-enter drop-shadow-md">`;
                textContainer.innerHTML = `<i class="fa-solid fa-check-circle mr-1"></i> ${detected.name} Network Detected`;
                textContainer.classList.remove('hidden');
                textContainer.classList.remove('text-red-500');
                textContainer.classList.add('text-blue-600');
            } else {
                logoContainer.innerHTML = `<i class="fa-solid fa-circle-question text-amber-500 logo-enter"></i>`;
                textContainer.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1"></i> Unknown Chain Format`;
                textContainer.classList.remove('hidden');
                textContainer.classList.remove('text-blue-600');
                textContainer.classList.add('text-red-500');
            }
        }

        function resetLogo() {
            document.getElementById('chain-logo-container').innerHTML = `<i class="fa-solid fa-magnifying-glass text-slate-600 logo-enter"></i>`;
            document.getElementById('chain-detected-text').classList.add('hidden');
        }

        function startReconstruction() {
            const val = document.getElementById('wallet_address').value.trim();
            if (!val) return;

            document.getElementById('input-container').style.display = 'none';
            document.getElementById('global-loader').style.display = 'flex';
            
            const texts = [
                "Extracting Ledger Subgraphs...",
                "Querying CEX Custodial Endpoints...",
                "Resolving Darknet Cross-References...",
                "Running LLM Heuristic Models...",
                "Finalizing Dossier Reconstruction..."
            ];
            let i = 0;
            const textEl = document.getElementById('loader-text');
            const interval = setInterval(() => {
                if (i < texts.length) {
                    textEl.innerText = texts[i];
                    i++;
                }
            }, 800);

            // Redirect to dashboard with address attached
            setTimeout(() => {
                clearInterval(interval);
                window.location.href = `/nemesis_id_new.html?address=${encodeURIComponent(val)}`;
            }, 4000);
        }
    </script>
    <script src="/static/js/particles.js"></script>
</body>
</html>
