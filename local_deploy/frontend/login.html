<body>
    <div class="grid-bg"></div>
    
    <div class="glass-panel p-10 rounded-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-[#00ff88] to-[#00b8ff] tracking-widest mb-2">NEMESIS</h1>
            <p class="text-sm text-slate-500 tracking-widest uppercase">Admin Authorization</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs text-slate-500 uppercase tracking-wider mb-2">Identifier</label>
                <input type="text" id="username" class="cyber-input w-full px-4 py-3 rounded-lg" placeholder="Enter Admin ID" required>
            </div>
            <div>
                <label class="block text-xs text-slate-500 uppercase tracking-wider mb-2">Passcode</label>
                <input type="password" id="password" class="cyber-input w-full px-4 py-3 rounded-lg" placeholder="••••••••••••" required>
            </div>
            
            <div id="error-msg" class="hidden text-red-500 text-sm text-center"></div>

            <button type="submit" class="cyber-btn w-full py-4 rounded-lg mt-4">
                Initialize Uplink
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error-msg');
            
            try {
                // Determine API URL based on environment
                const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const apiUrl = isLocal ? 'http://127.0.0.1:3001/api/login' : '/api/login';

                const formData = new URLSearchParams();
                formData.append('username', u);
                formData.append('password', p);

                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('nemesis_admin_token', data.access_token);
                    err.classList.add('hidden');
                    window.location.href = 'admin.html';
                } else {
                    err.textContent = data.detail || 'Access Denied.';
                    err.classList.remove('hidden');
                }
            } catch (error) {
                err.textContent = 'Connection to mainframe failed.';
                err.classList.remove('hidden');
            }
        });
    </script>

<script>
    (function() {
        if (window._nemesisLoaderInitialized) return;
        window._nemesisLoaderInitialized = true;
        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            const loader = document.getElementById('global-ajax-loader');
            if (loader) loader.style.display = 'flex';
            try {
                const response = await originalFetch.apply(this, args);
                return response;
            } finally {
                if (loader) loader.style.display = 'none';
            }
        };
    })();
</script>
