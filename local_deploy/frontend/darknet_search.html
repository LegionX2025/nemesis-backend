    <script>
        function updateChainIcon() {
            const select = document.getElementById('target_chain');
            const opt = select.options[select.selectedIndex];
            const container = document.getElementById('chain-icon-container');
            if (opt.dataset.iconSrc) {
                container.innerHTML = `<img src="${opt.dataset.iconSrc}" class="w-4 h-4 object-contain">`;
            } else {
                container.innerHTML = `<i class="fa-solid ${opt.dataset.icon} text-slate-500"></i>`;
            }
        }

        function updateCurrencyIcon() {
            const select = document.getElementById('target_currency');
            const opt = select.options[select.selectedIndex];
            const container = document.getElementById('currency-icon-container');
            if (opt.dataset.iconSrc) {
                container.innerHTML = `<img src="${opt.dataset.iconSrc}" class="w-4 h-4 object-contain">`;
            } else {
                container.innerHTML = `<i class="fa-solid ${opt.dataset.icon}"></i>`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            updateChainIcon();
            updateCurrencyIcon();
        });
        
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const loading = document.getElementById('loading');
            const resultsContainer = document.getElementById('resultsContainer');
            
            loading.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            resultsContainer.innerHTML = '';

            try {
                // Ensure this URL points to the backend /api/darknet/search endpoint
                // Assuming it's running on the same host or has CORS enabled
                const response = await fetch(window.BACKEND_URL + '/api/darknet/search?q=' + encodeURIComponent(query));
                const data = await response.json();

                if (data.error || data.status === 'error') {
                    resultsContainer.innerHTML = `<div class="glass-panel p-6 text-red-400">Error: ${data.message || data.error}</div>`;
                } else if (data.results && data.results.length > 0) {
                    let html = `<h2 class="text-xl font-semibold text-slate-500 mb-4">Found ${data.results.length} Intel Records</h2>`;
                    
                    data.results.forEach(doc => {
                        const web = doc.web_info || {};
                        const title = web.title || 'Untitled Onion Site';
                        const url = web.url || 'Unknown URL';
                        const content = (web.content || '').substring(0, 300) + '...';
                        
                        let entitiesHtml = '';
                        if (doc.uie_entities && doc.uie_entities.length > 0) {
                            const uniqueEntities = [...new Set(doc.uie_entities.map(e => e.value))].slice(0, 5);
                            entitiesHtml = `<div class="mt-3 flex flex-wrap gap-2">
                                ${uniqueEntities.map(e => `<span class="px-2 py-1 bg-red-900/40 text-red-300 border border-red-800 rounded text-xs font-mono">${e}</span>`).join('')}
                            </div>`;
                        }

                        html += `
                        <div class="glass-panel p-6 transition-all duration-300 hover:border-purple-500/50">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-lg font-bold text-slate-200 truncate pr-4">${title}</h3>
                                <span class="text-xs text-gray-500 whitespace-nowrap">${doc.crawled_at || 'Recent'}</span>
                            </div>
                            <a href="${url}" target="_blank" class="text-sm text-purple-400 hover:text-purple-300 mb-3 block truncate font-mono">${url}</a>
                            <p class="text-slate-500 text-sm leading-relaxed">${content}</p>
                            ${entitiesHtml}
                        </div>
                        `;
                    });
                    resultsContainer.innerHTML = html;
                } else {
                    resultsContainer.innerHTML = `<div class="glass-panel p-6 text-slate-500 text-center">No intel records found matching your query.</div>`;
                }
            } catch (err) {
                resultsContainer.innerHTML = `<div class="glass-panel p-6 text-red-400">Network Error: Could not connect to Darknet index.</div>`;
            }

            loading.classList.add('hidden');
            resultsContainer.classList.remove('hidden');
        }

        // Enter key support
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });

        // SSE Listener for Terminal
        document.addEventListener("DOMContentLoaded", () => {
            const evtSource = new EventSource(window.BACKEND_URL + "/api/stream");
            const terminal = document.getElementById("terminal-output");
            
            evtSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    const el = document.createElement("div");
                    let added = false;
                    
                    if (data.message) {
                        let colorClass = "text-slate-500";
                        if (data.style === "red" || data.style === "bold red") colorClass = "text-red-400 font-bold";
                        if (data.style === "green" || data.style === "bold green") colorClass = "text-green-400";
                        if (data.style === "yellow" || data.style === "bold yellow") colorClass = "text-yellow-400";
                        if (data.style === "dim" || data.style === "dim white") colorClass = "text-gray-500";
                        
                        el.className = colorClass;
                        el.innerHTML = `<span class="text-purple-500/50 mr-2">[${data.ts}]</span> ${data.message.replace(/</g, "&lt;").replace(/>/g, "&gt;")}`;
                        added = true;
                    } else if (data.type) {
                        el.className = "text-cyan-400 font-bold border-l border-cyan-500/30 pl-3 ml-2 my-2 bg-cyan-900/10 py-1.5 rounded-r";
                        el.innerHTML = `<span class="text-cyan-600 mr-2">[ENTITY]</span> <span class="text-purple-300">${data.type}</span>: <span class="text-slate-200">${data.val}</span> <span class="text-gray-500 font-normal text-[9px] truncate block mt-1"><i class="fa-solid fa-link"></i> ${data.src}</span>`;
                        added = true;
                    }
                    
                    if(added) {
                        // Remove initial message
                        if(terminal.children.length === 1 && terminal.children[0].classList.contains("italic")) {
                            terminal.innerHTML = "";
                        }
                        
                        terminal.appendChild(el);
                        if(terminal.children.length > 150) terminal.removeChild(terminal.firstChild);
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                } catch(e) {}
            };
        });
    </script>

            box-shadow: 0 8px 32px rgba(30, 58, 138, 0.05);
            border-radius: 16px;
        }
        
        .nemesis-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
        }
        
        .nemesis-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .metric-value {
            color: #0f172a;
            font-weight: 800;
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .metric-label {
            color: #64748b;
            font-weight: 600;
        }
        
        /* Table styles */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        th {
            color: #475569;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 12px;
            border-bottom: 2px solid #e2e8f0;
        }
        td {
            background: rgba(255, 255, 255, 0.5);
            padding: 16px 12px;
            color: #1e293b;
        }
        tr td:first-child { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        tr td:last-child { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
        
        /* Override Cytoscape Canvas Background */
        #nemesis-graph {
            background: transparent !important;
            border-radius: 16px;
        }
    </style>
</div>
<script>
    (function() {
        if (window._nemesisLoaderInitialized) return;
        window._nemesisLoaderInitialized = true;
        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            const loader = document.getElementById('global-ajax-loader');
            if (loader) loader.style.display = 'flex';
            try {
                const response = await originalFetch.apply(this, args);
                return response;
            } finally {
                if (loader) loader.style.display = 'none';
            }
        };
    })();
</script>
