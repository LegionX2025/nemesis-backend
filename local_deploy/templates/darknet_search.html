<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lionsgate NEMESIS | Darknet Intelligence Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>

        // ==========================================
        // DYNAMIC BACKEND ROUTING FOR CLOUDFLARE/LOCAL
        // ==========================================
        const IS_LOCAL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        window.BACKEND_URL = IS_LOCAL ? "" : "http://127.0.0.1:3001";
        
        let protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        window.WS_URL = IS_LOCAL ? (protocol + window.location.host) : "ws://127.0.0.1:3001";
        // ==========================================
</script>
    <style>
        body { background-color: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        .neon-border {
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2), inset 0 0 10px rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.4);
        }
        .search-input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-5xl space-y-8">
        <div class="text-center">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 tracking-tight">NEMESIS DARKNET INDEX</h1>
            <p class="mt-3 text-lg text-gray-400">Query the autonomous deep-web intelligence database.</p>
        </div>

        <div class="glass-panel p-6 shadow-2xl">
            <div class="flex gap-4">
                <input type="text" id="searchInput" placeholder="Enter keyword, wallet address, or onion URL..." class="flex-1 bg-black/50 border border-gray-700 text-white rounded-lg px-4 py-3 search-input transition-all duration-300">
                <button onclick="performSearch()" class="px-8 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-semibold transition-colors duration-200 neon-border">SEARCH</button>
            </div>
            
            <div id="loading" class="hidden mt-6 text-center text-purple-400">
                <svg class="animate-spin h-8 w-8 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="mt-2 text-sm">Querying Darknet Database...</p>
            </div>
        </div>

        <!-- LIVE TERMINAL STREAM -->
        <div class="glass-panel mt-8 p-0 overflow-hidden neon-border flex flex-col h-80" id="terminal-container">
            <div class="bg-black/80 px-4 py-2 border-b border-purple-500/30 flex justify-between items-center">
                <span class="text-xs font-bold text-purple-400 tracking-widest uppercase"><i class="fa-solid fa-terminal mr-2"></i>Darknet Stream <span class="animate-pulse text-green-400 ml-2">● LIVE</span></span>
                <button onclick="document.getElementById('terminal-output').innerHTML=''" class="text-[10px] text-gray-500 hover:text-white transition">CLEAR</button>
            </div>
            <div id="terminal-output" class="flex-1 overflow-y-auto p-4 font-mono text-[11px] space-y-1.5 bg-black/60">
                <div class="text-gray-500 italic">Initializing secure connection to Darknet Indexing Engine...</div>
            </div>
        </div>

        <div id="resultsContainer" class="space-y-6 hidden">
            <!-- Results will be injected here -->
        </div>
    </div>

    <script>
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const loading = document.getElementById('loading');
            const resultsContainer = document.getElementById('resultsContainer');
            
            loading.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            resultsContainer.innerHTML = '';

            try {
                // Ensure this URL points to the backend /api/darknet/search endpoint
                // Assuming it's running on the same host or has CORS enabled
                const response = await fetch(window.BACKEND_URL + '/api/darknet/search?q=' + encodeURIComponent(query));
                const data = await response.json();

                if (data.error || data.status === 'error') {
                    resultsContainer.innerHTML = `<div class="glass-panel p-6 text-red-400">Error: ${data.message || data.error}</div>`;
                } else if (data.results && data.results.length > 0) {
                    let html = `<h2 class="text-xl font-semibold text-gray-300 mb-4">Found ${data.results.length} Intel Records</h2>`;
                    
                    data.results.forEach(doc => {
                        const web = doc.web_info || {};
                        const title = web.title || 'Untitled Onion Site';
                        const url = web.url || 'Unknown URL';
                        const content = (web.content || '').substring(0, 300) + '...';
                        
                        let entitiesHtml = '';
                        if (doc.uie_entities && doc.uie_entities.length > 0) {
                            const uniqueEntities = [...new Set(doc.uie_entities.map(e => e.value))].slice(0, 5);
                            entitiesHtml = `<div class="mt-3 flex flex-wrap gap-2">
                                ${uniqueEntities.map(e => `<span class="px-2 py-1 bg-red-900/40 text-red-300 border border-red-800 rounded text-xs font-mono">${e}</span>`).join('')}
                            </div>`;
                        }

                        html += `
                        <div class="glass-panel p-6 transition-all duration-300 hover:border-purple-500/50">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-lg font-bold text-white truncate pr-4">${title}</h3>
                                <span class="text-xs text-gray-500 whitespace-nowrap">${doc.crawled_at || 'Recent'}</span>
                            </div>
                            <a href="${url}" target="_blank" class="text-sm text-purple-400 hover:text-purple-300 mb-3 block truncate font-mono">${url}</a>
                            <p class="text-gray-400 text-sm leading-relaxed">${content}</p>
                            ${entitiesHtml}
                        </div>
                        `;
                    });
                    resultsContainer.innerHTML = html;
                } else {
                    resultsContainer.innerHTML = `<div class="glass-panel p-6 text-gray-400 text-center">No intel records found matching your query.</div>`;
                }
            } catch (err) {
                resultsContainer.innerHTML = `<div class="glass-panel p-6 text-red-400">Network Error: Could not connect to Darknet index.</div>`;
            }

            loading.classList.add('hidden');
            resultsContainer.classList.remove('hidden');
        }

        // Enter key support
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });

        // SSE Listener for Terminal
        document.addEventListener("DOMContentLoaded", () => {
            const evtSource = new EventSource(window.BACKEND_URL + "/api/stream");
            const terminal = document.getElementById("terminal-output");
            
            evtSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    const el = document.createElement("div");
                    let added = false;
                    
                    if (data.message) {
                        let colorClass = "text-gray-300";
                        if (data.style === "red" || data.style === "bold red") colorClass = "text-red-400 font-bold";
                        if (data.style === "green" || data.style === "bold green") colorClass = "text-green-400";
                        if (data.style === "yellow" || data.style === "bold yellow") colorClass = "text-yellow-400";
                        if (data.style === "dim" || data.style === "dim white") colorClass = "text-gray-500";
                        
                        el.className = colorClass;
                        el.innerHTML = `<span class="text-purple-500/50 mr-2">[${data.ts}]</span> ${data.message.replace(/</g, "&lt;").replace(/>/g, "&gt;")}`;
                        added = true;
                    } else if (data.type) {
                        el.className = "text-cyan-400 font-bold border-l border-cyan-500/30 pl-3 ml-2 my-2 bg-cyan-900/10 py-1.5 rounded-r";
                        el.innerHTML = `<span class="text-cyan-600 mr-2">[ENTITY]</span> <span class="text-purple-300">${data.type}</span>: <span class="text-white">${data.val}</span> <span class="text-gray-500 font-normal text-[9px] truncate block mt-1"><i class="fa-solid fa-link"></i> ${data.src}</span>`;
                        added = true;
                    }
                    
                    if(added) {
                        // Remove initial message
                        if(terminal.children.length === 1 && terminal.children[0].classList.contains("italic")) {
                            terminal.innerHTML = "";
                        }
                        
                        terminal.appendChild(el);
                        if(terminal.children.length > 150) terminal.removeChild(terminal.firstChild);
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                } catch(e) {}
            };
        });
    </script>
</body>
</html>
